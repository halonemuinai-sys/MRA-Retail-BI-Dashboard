<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>

<script>
    /**
     * RETAIL DASHBOARD - FRONT END CONTROLLER (CORE)
     * File: JavaScript.html
     * Description: Single controller containing ALL logic.
     * Status: UPDATED (Added Direct PDF Download)
     */

    // ==========================================
    // 1. CONSTANTS & THEME
    // ==========================================
    const THEME = {
        colors: {
            chart: ['#3B82F6', '#F59E0B', '#10B981', '#EC4899', '#8B5CF6', '#6366F1'],
            gradientBlue: ['rgba(37, 99, 235, 0.8)', 'rgba(37, 99, 235, 0.2)'],
            gradientGreen: ['rgba(16, 185, 129, 0.8)', 'rgba(16, 185, 129, 0.2)'],
            catColors: { "Jewelry": "#F59E0B", "Watches": "#3B82F6", "Accessories": "#EC4899", "Perfume": "#10B981" },
            segments: {
                "Prospect": "#94A3B8", "Potential": "#2563EB", "High Potential": "#0D9488",
                "Elite": "#9333EA", "Top": "#1E293B", "Inactive": "#E11D48"
            }
        },
        chartDefaults: {
            responsive: true, maintainAspectRatio: false,
            plugins: {
                legend: { display: true, position: 'right', labels: { usePointStyle: true, font: { family: 'Inter', size: 11 } } },
                datalabels: { color: '#fff', font: { weight: 'bold', size: 10 } }
            },
            layout: { padding: 20 }
        }
    };

    // ==========================================
    // 2. STATE MANAGEMENT
    // ==========================================
    const STATE = {
        currentMode: 'monthly',
        globalAdvisorData: [], // Stores advisor data for Modal access
        customerData: [],      // Stores customer data for Client-side Search
        activeSegmentFilter: null, // Stores active customer segment filter
        sapSubView: 'topPerformers', // Tracks SAP Top vs Projection sub-view
        quarterlySubView: 'standard', // Tracks Quarterly Standard vs Budget view
        crossingSubView: 'crossing', // Tracks Crossing vs Footfall view
        footfallData: null, // Stores active Footfall data for CSV Export
        charts: {
            cat: null, trend: null, daily: null, monthlyTrans: null,
            categoryTrend: null, categoryTrendQty: null, advisorStore: null,
            custSegment: null, custRevenue: null, comparison: null, advisorCategory: null
        }
    };

    // ==========================================
    // 3. CORE & HELPERS
    // ==========================================
    const HELPERS = {
        formatIDR: (num) => new Intl.NumberFormat('id-ID', { maximumFractionDigits: 0 }).format(num),
        formatPct: (num) => num ? num.toFixed(1) + "%" : "0.0%",
        formatDate: (dateStr) => { const d = new Date(dateStr); return d.toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' }); },

        getStatusColor: (achv) => {
            if (achv >= 100) return { text: 'text-blue-600', bg: 'bg-blue-50', border: 'border-blue-100', bar: 'bg-blue-600' };
            if (achv >= 80) return { text: 'text-emerald-600', bg: 'bg-emerald-50', border: 'border-emerald-100', bar: 'bg-emerald-500' };
            return { text: 'text-rose-600', bg: 'bg-rose-50', border: 'border-rose-100', bar: 'bg-rose-500' };
        },

        getSegmentBadge: (segment) => {
            const styles = {
                "Prospect": "bg-slate-100 text-slate-600 border-slate-200", "Potential": "bg-blue-50 text-blue-600 border-blue-100",
                "High Potential": "bg-teal-50 text-teal-600 border-teal-100", "Elite": "bg-purple-50 text-purple-600 border-purple-100",
                "Top": "bg-slate-800 text-amber-400 border-slate-700 shadow-sm", "Inactive": "bg-rose-50 text-rose-600 border-rose-100"
            };
            const cls = styles[segment] || "bg-gray-50 text-gray-500";
            return `<span class="px-2.5 py-0.5 rounded-full text-[10px] font-bold border ${cls}">${segment}</span>`;
        },

        getChartPlugins: () => { return (typeof ChartDataLabels !== 'undefined') ? [ChartDataLabels] : []; }
    };

    // ==========================================
    // 4. UI FUNCTIONS
    // ==========================================
    const UI = {
        showToast: (message) => {
            const toast = document.getElementById("toast");
            if (toast) { toast.innerText = message; toast.className = "show"; setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000); }
        },
        showLoader: (show) => { const loader = document.getElementById('loader'); if (loader) loader.classList.toggle('hidden', !show); },

        // UPDATE: Set default dates correctly
        initDefaults: () => {
            const now = new Date();

            // Calculate Yesterday
            const yesterday = new Date(now);
            yesterday.setDate(now.getDate() - 1);

            // --- MONTHLY DEFAULTS (Current Month) ---
            const monthSelect = document.getElementById('monthSelect');
            const yearSelect = document.getElementById('yearSelect');
            const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

            if (monthSelect) {
                // FORCE: Always select current month (World Calendar)
                monthSelect.value = months[now.getMonth()];
            }
            if (yearSelect) {
                // FORCE: Always select current year (World Calendar)
                yearSelect.value = String(now.getFullYear());
            }

            // --- DAILY DEFAULTS (Yesterday) ---
            const dateInput = document.getElementById('dateInput');
            if (dateInput && dateInput.value === "") {
                const yyyy = yesterday.getFullYear();
                const mm = String(yesterday.getMonth() + 1).padStart(2, '0');
                const dd = String(yesterday.getDate()).padStart(2, '0');
                dateInput.value = `${yyyy}-${mm}-${dd}`;
            }

            // --- QUARTERLY DEFAULTS ---
            const quarterYearSelect = document.getElementById('quarterlyYearSelect');
            if (quarterYearSelect) {
                quarterYearSelect.value = String(now.getFullYear());
                quarterYearSelect.addEventListener('change', (e) => {
                    if (STATE.quarterlySubView === 'budget') {
                        if (e.target.value !== '2026') {
                            document.getElementById('quarterlyBudgetErrorMsg').classList.remove('hidden');
                            document.getElementById('quarterlyBudgetContent').classList.add('hidden');
                        } else {
                            document.getElementById('quarterlyBudgetErrorMsg').classList.add('hidden');
                            document.getElementById('quarterlyBudgetContent').classList.remove('hidden');
                            APP.loadDashboard(); // trigger reload to get data
                        }
                    }
                });
            }
        },
        setText: (id, text) => { const el = document.getElementById(id); if (el) el.innerText = text; },
        setHTML: (id, html) => { const el = document.getElementById(id); if (el) el.innerHTML = html; }
    };

    // ==========================================
    // 5. APPLICATION LOGIC
    // ==========================================
    const APP = {

        switchTab: (mode) => {
            STATE.currentMode = mode;

            // Update Tab Classes
            const tabs = ['tabMonthly', 'tabDaily', 'tabMonthlyTransaction', 'tabQuarterly', 'tabSap', 'tabCustomer', 'tabAdvisor', 'tabCrossing'];
            const views = ['viewMonthly', 'viewDaily', 'viewMonthlyTransaction', 'viewQuarterly', 'viewSap', 'viewCustomer', 'viewAdvisor', 'viewCrossing'];

            tabs.forEach(t => {
                const el = document.getElementById(t);
                if (el) el.className = "px-5 py-2 rounded-md text-xs font-bold text-slate-500 hover:text-brand-dark transition-all duration-200 border border-transparent hover:bg-white tracking-wide whitespace-nowrap";
            });
            const activeTabEl = document.getElementById('tab' + mode.charAt(0).toUpperCase() + mode.slice(1));
            if (activeTabEl) activeTabEl.className = "px-5 py-2 rounded-md text-xs font-bold transition-all duration-200 tab-active border border-transparent tracking-wide whitespace-nowrap";

            // Toggle View Visibility
            views.forEach(v => { const el = document.getElementById(v); if (el) el.classList.add('hidden'); });
            const activeViewEl = document.getElementById('view' + mode.charAt(0).toUpperCase() + mode.slice(1));
            if (activeViewEl) activeViewEl.classList.remove('hidden');

            // Handle Filter Visibility
            const monthlyFilter = document.getElementById('filterMonthly');
            const dailyFilter = document.getElementById('filterDaily');

            if (monthlyFilter) monthlyFilter.classList.add('hidden');
            if (dailyFilter) dailyFilter.classList.add('hidden');

            if (mode === 'daily') {
                if (dailyFilter) dailyFilter.classList.remove('hidden');
                if (monthlyFilter) monthlyFilter.classList.remove('hidden'); // Heatmap needs monthly filter
            } else if (mode === 'customer' || mode === 'quarterly') {
                // Customer and Quarterly views don't need the default monthly filter
                if (monthlyFilter) monthlyFilter.classList.add('hidden');
            } else {
                // Monthly, Transaction, SAP, Advisor, and Crossing views use Monthly filter
                if (monthlyFilter) monthlyFilter.classList.remove('hidden');
            }

            APP.loadDashboard();
        },

        switchMonthlySubView: (subView) => {
            STATE.monthlySubView = subView;

            // Toggle Buttons
            const btnTable = document.getElementById('monthlySubTable');
            const btnHeatmap = document.getElementById('monthlySubHeatmap');

            if (subView === 'table') {
                btnTable.className = "px-4 py-1.5 rounded-md text-[11px] font-bold transition-all bg-brand-dark text-white shadow-sm";
                btnHeatmap.className = "px-4 py-1.5 rounded-md text-[11px] font-bold text-slate-500 hover:bg-slate-100 transition-all border border-transparent";
                document.getElementById('monthlyTableView').classList.remove('hidden');
                document.getElementById('monthlyHeatmapView').classList.add('hidden');
            } else {
                btnHeatmap.className = "px-4 py-1.5 rounded-md text-[11px] font-bold transition-all bg-brand-dark text-white shadow-sm";
                btnTable.className = "px-4 py-1.5 rounded-md text-[11px] font-bold text-slate-500 hover:bg-slate-100 transition-all border border-transparent";
                document.getElementById('monthlyHeatmapView').classList.remove('hidden');
                document.getElementById('monthlyTableView').classList.add('hidden');
            }

            APP.loadDashboard();
        },

        switchQuarterlySubView: (subView) => {
            STATE.quarterlySubView = subView;

            // Toggle Buttons
            const btnStandard = document.getElementById('btnQuarterlyStandard');
            const btnBudget = document.getElementById('btnQuarterlyBudget');

            if (subView === 'standard') {
                btnStandard.className = "px-4 py-1.5 rounded-md text-xs font-bold transition-all duration-200 bg-white text-brand-dark shadow-sm ring-1 ring-slate-900/5";
                btnBudget.className = "px-4 py-1.5 rounded-md text-xs font-bold text-slate-500 hover:text-brand-dark transition-all duration-200";
                document.getElementById('quarterlyStandardView').classList.remove('hidden');
                document.getElementById('quarterlyBudgetView').classList.add('hidden');
            } else {
                btnBudget.className = "px-4 py-1.5 rounded-md text-xs font-bold transition-all duration-200 bg-white text-brand-dark shadow-sm ring-1 ring-slate-900/5";
                btnStandard.className = "px-4 py-1.5 rounded-md text-xs font-bold text-slate-500 hover:text-brand-dark transition-all duration-200";
                document.getElementById('quarterlyBudgetView').classList.remove('hidden');
                document.getElementById('quarterlyStandardView').classList.add('hidden');
            }

            APP.loadDashboard();
        },

        switchCrossingSubView: (subView) => {
            STATE.crossingSubView = subView;

            // Toggle Buttons
            const btnCrossing = document.getElementById('btnCrossSales');
            const btnFootfall = document.getElementById('btnCrossFootfall');

            if (subView === 'crossing') {
                btnCrossing.className = "px-4 py-1.5 rounded-md text-[11px] font-bold transition-all bg-brand-dark text-white shadow-sm";
                btnFootfall.className = "px-4 py-1.5 rounded-md text-[11px] font-bold text-slate-500 hover:bg-slate-100 transition-all border border-transparent";
                document.getElementById('crossingSalesSubView').classList.remove('hidden');
                document.getElementById('crossingFootfallSubView').classList.add('hidden');
            } else {
                btnFootfall.className = "px-4 py-1.5 rounded-md text-[11px] font-bold transition-all bg-brand-dark text-white shadow-sm";
                btnCrossing.className = "px-4 py-1.5 rounded-md text-[11px] font-bold text-slate-500 hover:bg-slate-100 transition-all border border-transparent";
                document.getElementById('crossingFootfallSubView').classList.remove('hidden');
                document.getElementById('crossingSalesSubView').classList.add('hidden');
            }

            APP.loadDashboard();
        },

        syncData: () => {
            UI.showLoader(true);
            google.script.run.withSuccessHandler((res) => {
                UI.showLoader(false);
                if (res.success) { UI.showToast(res.message); APP.loadDashboard(true); }
                else { UI.showToast(res.message); }
            }).runDataSync();
        },

        loadDashboard: (isRefresh = false) => {
            UI.showLoader(true);
            const { currentMode } = STATE;

            if (currentMode === 'monthly' || currentMode === 'monthlyTransaction') {
                const m = document.getElementById('monthSelect').value;
                const y = document.getElementById('yearSelect').value;

                if (currentMode === 'monthlyTransaction' && STATE.monthlySubView === 'heatmap') {
                    google.script.run.withSuccessHandler(RENDER.calendar).getDashboardData(m, y, isRefresh);
                } else {
                    const handler = currentMode === 'monthly' ? RENDER.monthly : RENDER.monthlyTransaction;
                    google.script.run.withSuccessHandler(handler).getDashboardData(m, y, isRefresh);
                }

            } else if (currentMode === 'advisor') {
                const m = document.getElementById('monthSelect').value;
                const y = document.getElementById('yearSelect').value;
                // Panggil RENDER.advisor
                google.script.run.withSuccessHandler(RENDER.advisor).getDashboardData(m, y, isRefresh);

            } else if (currentMode === 'daily') {
                const d = document.getElementById('dateInput').value;
                google.script.run.withSuccessHandler(RENDER.daily).getDetailedDailyData(d);
            } else if (currentMode === 'sap') {
                const m = document.getElementById('monthSelect').value;
                const y = document.getElementById('yearSelect').value;
                if (STATE.sapSubView === 'projection') {
                    APP.loadSapTrend(isRefresh);
                } else {
                    google.script.run.withSuccessHandler(RENDER.sapPerformance).getSapPerformance(m, y, isRefresh);
                }
            } else if (currentMode === 'customer') {
                google.script.run.withSuccessHandler(RENDER.customer).getCustomerSegmentationData();
            } else if (currentMode === 'quarterly') {
                const q = document.getElementById('quarterSelect').value;
                const y = document.getElementById('quarterYearSelect').value;

                if (STATE.quarterlySubView === 'standard') {
                    document.getElementById('quarterlyBudgetErrorMsg').classList.add('hidden');
                    document.getElementById('quarterlyBudgetContent').classList.add('hidden');
                    google.script.run.withSuccessHandler(RENDER.quarterly).getQuarterlyData(q, y, isRefresh);
                } else {
                    if (y !== '2026') {
                        document.getElementById('quarterlyBudgetErrorMsg').classList.remove('hidden');
                        document.getElementById('quarterlyBudgetContent').classList.add('hidden');
                        UI.showLoader(false);
                    } else {
                        document.getElementById('quarterlyBudgetErrorMsg').classList.add('hidden');
                        document.getElementById('quarterlyBudgetContent').classList.remove('hidden');
                        google.script.run.withSuccessHandler(RENDER.quarterlyBudget).getQuarterlyBudgetData(q, y, isRefresh);
                    }
                }
            } else if (currentMode === 'crossing') {
                if (STATE.crossingSubView === 'footfall') {
                    const m = document.getElementById('monthSelect').value;
                    const y = document.getElementById('yearSelect').value;
                    google.script.run
                        .withFailureHandler((err) => {
                            console.error("GAS Error:", err);
                            UI.showToast("Error fetching footfall: " + err.message);
                            UI.showLoader(false);
                        })
                        .withSuccessHandler((res) => {
                            console.log("Footfall Data Response:", res);
                            STATE.footfallData = res;
                            UI.showLoader(false);
                            CHARTS.renderCustomerFootfall(res);
                        })
                        .getFootfallData(m, y);
                } else {
                    APP.loadCrossingSales(isRefresh);
                }
            }
        },

        loadCrossingSales: (isRefresh = false) => {
            UI.showLoader(true);
            const m = document.getElementById('monthSelect').value;
            const y = document.getElementById('yearSelect').value;
            google.script.run.withSuccessHandler(RENDER.crossingSales).withFailureHandler((err) => {
                UI.showToast("Error: " + err.message); UI.showLoader(false);
            }).getCrossingSalesData(m, y, isRefresh);
        },

        exportFootfallCSV: () => {
            if (!STATE.footfallData || !STATE.footfallData.dailyTrend || STATE.footfallData.dailyTrend.length === 0) {
                UI.showToast("No Footfall data available to export. Please load data first.");
                return;
            }

            const month = document.getElementById('monthSelect').value;
            const year = document.getElementById('yearSelect').value;

            let csvContent = "Date,PI In,PI Out,PS In,PS Out,Total Combined In\n";

            STATE.footfallData.dailyTrend.forEach((d, idx) => {
                const day = idx + 1;
                const fullDate = `${day}-${month.substring(0, 3)}-${year}`;
                const piIn = d.PI_In || 0;
                const piOut = d.PI_Out || 0;
                const psIn = d.PS_In || 0;
                const psOut = d.PS_Out || 0;
                const totalIn = piIn + psIn;

                csvContent += `${fullDate},${piIn},${piOut},${psIn},${psOut},${totalIn}\n`;
            });

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            link.setAttribute("href", url);
            link.setAttribute("download", `Store_Footfall_Breakdown_${month}_${year}.csv`);
            link.style.visibility = 'hidden';

            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            UI.showToast("CSV Footfall downloaded.");
        },

        downloadCrossingSales: (type) => {
            UI.showLoader(true);
            document.getElementById('loaderText').innerText = "GENERATING " + type.toUpperCase() + "...";
            const m = document.getElementById('monthSelect').value;
            const y = document.getElementById('yearSelect').value;

            if (type === 'pdf') {
                google.script.run.withSuccessHandler(handleExportDownload).withFailureHandler((err) => {
                    UI.showToast("Export failed: " + err.message); UI.showLoader(false); document.getElementById('loaderText').innerText = "Processing Data...";
                }).downloadCrossingSalesReportPDF(m, y);
            } else {
                google.script.run.withSuccessHandler(handleExportDownload).withFailureHandler((err) => {
                    UI.showToast("Export failed: " + err.message); UI.showLoader(false); document.getElementById('loaderText').innerText = "Processing Data...";
                }).downloadCrossingSalesReportExcel(m, y);
            }
        },

        printDaily: () => {
            document.body.classList.add('print-mode-daily');
            window.print();
            document.body.classList.remove('print-mode-daily');
        },

        downloadAnnualAdvisorExcel: () => {
            const elYear = document.getElementById('yearSelect');
            const selectedYear = elYear ? Number(elYear.value) : new Date().getFullYear();
            UI.showToast("Preparing Excel format...");
            google.script.run.withSuccessHandler((res) => {
                if (res.error) {
                    UI.showToast("Error: " + res.error);
                } else {
                    const blob = new Blob([Uint8Array.from(atob(res.base64), c => c.charCodeAt(0))], { type: 'text/csv' });
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(blob);
                    link.download = res.filename;
                    link.click();
                    UI.showToast("Download started!");
                }
            }).downloadAnnualAdvisorReportExcel(selectedYear);
        },




        // CUSTOMER FILTER LOGIC (Centralized)
        filterCustomerTable: () => {
            const input = document.getElementById('custSearchInput');
            const searchText = input ? input.value.toLowerCase() : "";
            const segmentFilter = STATE.activeSegmentFilter; // "Prospect", "Elite", etc. or null

            const filteredData = STATE.customerData.filter(c => {
                const matchesSearch = c.name.toLowerCase().includes(searchText);
                const matchesSegment = segmentFilter ? c.segment === segmentFilter : true;
                return matchesSearch && matchesSegment;
            });

            RENDER.renderCustomerTable(filteredData);
        },

        // Called by Search Input
        searchCustomer: () => {
            APP.filterCustomerTable();
        },

        // Called by Segment Chips
        toggleSegmentFilter: (segment) => {
            // Toggle Logic
            if (STATE.activeSegmentFilter === segment) {
                STATE.activeSegmentFilter = null; // Turn off if clicked again
            } else {
                STATE.activeSegmentFilter = segment; // Set new filter
            }

            // Update UI (Chips)
            const segments = ["Prospect", "Potential", "High Potential", "Elite", "Top", "Inactive"];
            segments.forEach(seg => {
                const btn = document.getElementById(`seg-${seg}`);
                if (btn) {
                    if (STATE.activeSegmentFilter === seg) {
                        // ACTIVE STATE STYLES
                        btn.style.borderColor = "#9333ea"; // Purple outline
                        btn.style.backgroundColor = "#faf5ff";
                        btn.style.boxShadow = "0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06)";
                        btn.style.transform = "scale(1.05)";
                    } else {
                        // RESET STYLES (Clear inline styles to revert to class defaults)
                        btn.style.borderColor = "";
                        btn.style.backgroundColor = "";
                        btn.style.boxShadow = "";
                        btn.style.transform = "";
                    }
                }
            });

            APP.filterCustomerTable();
        },

        viewAdvisorDetails: (index) => {
            const advisor = STATE.globalAdvisorData[index];
            if (!advisor) return;

            UI.setText('modalAdvName', advisor.name);
            UI.setText('modalAdvLoc', advisor.location);
            UI.setText('modalAdvSales', HELPERS.formatIDR(advisor.netSales));

            // Reset chart instance to prevent ghosting
            if (STATE.charts.advisorStore) {
                STATE.charts.advisorStore.destroy();
                STATE.charts.advisorStore = null;
            }

            const storeData = advisor.storeData || { totalSales: 0, target: 0, achievement: 0, status: "-", advisorContrib: 0 };
            UI.setText('modalAdvContrib', HELPERS.formatPct(storeData.advisorContrib));
            UI.setText('modalStoreActual', HELPERS.formatIDR(storeData.totalSales));
            UI.setText('modalStoreTarget', HELPERS.formatIDR(storeData.target));

            const colors = HELPERS.getStatusColor(storeData.achievement);
            const elStatus = document.getElementById('modalStoreStatus');
            if (elStatus) {
                elStatus.innerText = storeData.status + ` (${HELPERS.formatPct(storeData.achievement)})`;
                elStatus.className = `font-bold ${colors.text}`;
            }

            const elBar = document.getElementById('modalStoreBar');
            if (elBar) {
                elBar.style.width = Math.min(storeData.achievement, 100) + "%";
                elBar.className = `h-2 rounded-full transition-all duration-500 ${colors.bar}`;
            }

            let catHtml = "";
            if (advisor.categoryMix && advisor.categoryMix.length > 0) {
                advisor.categoryMix.forEach(cat => { catHtml += `<tr class="border-b border-slate-50 last:border-0"><td class="p-2.5 text-slate-700 font-medium">${cat.category}</td><td class="p-2.5 text-center font-mono text-slate-600">${cat.qty}</td><td class="p-2.5 text-right font-mono text-slate-500">${HELPERS.formatIDR(cat.amount)}</td><td class="p-2.5 text-right text-brand-blue font-bold">${cat.pct.toFixed(1)}%</td></tr>`; });
            } else {
                catHtml = `<tr><td colspan="4" class="p-4 text-center text-slate-400 italic">No category data available</td></tr>`;
            }
            UI.setHTML('modalCatTableBody', catHtml);

            if (advisor.storeMix && advisor.storeMix.length > 0) {
                CHARTS.renderAdvisorStore(advisor.storeMix);
            }

            const modal = document.getElementById('advisorModal');
            const content = document.getElementById('advisorModalContent');
            if (modal) modal.classList.remove('hidden');
            if (content) { setTimeout(() => { content.classList.remove('scale-95', 'opacity-0'); content.classList.add('scale-100', 'opacity-100'); }, 10); }
        },

        closeAdvisorModal: () => {
            const modal = document.getElementById('advisorModal');
            const content = document.getElementById('advisorModalContent');
            if (content) { content.classList.remove('scale-100', 'opacity-100'); content.classList.add('scale-95', 'opacity-0'); }
            if (modal) { setTimeout(() => { modal.classList.add('hidden'); }, 300); }
        },

        // --- NEW: Customer Detail Modal Logic ---
        viewCustomerDetails: (customerName) => {
            UI.showLoader(true);
            UI.setText('loaderText', `Fetching ${customerName}...`);
            google.script.run.withSuccessHandler(res => {
                UI.showLoader(false);
                if (res.error) { UI.showToast(res.error); return; }

                UI.setText('modalCustName', customerName);

                // Find segment from state
                const custInfo = STATE.customerData.find(c => c.name === customerName);
                if (custInfo) {
                    const elSegment = document.getElementById('modalCustSegment');
                    if (elSegment) elSegment.innerHTML = HELPERS.getSegmentBadge(custInfo.segment);
                    UI.setText('modalCustFirstVisit', custInfo.recency + " days ago");
                    // Last visit assumption for now based on current year or history list below
                }

                UI.setText('modalCustTotalSpend', HELPERS.formatIDR(res.totalSpend));

                let totalQty = 0;
                let firstVisitStr = "-";
                let lastVisitStr = "-";

                // History Table
                let histHtml = "";

        calendar: (data) => {
            UI.showLoader(false);
            if (data.error) { UI.showToast(data.error); return; }

            const m = document.getElementById('monthSelect').value;
            const y = document.getElementById('yearSelect').value;
            UI.setText('calendarMonthTitle', `Daily Performance Heatmap - ${m.substr(0, 3)} ${y}`);

            const dailyData = data.dailyTrendData;
            if (!dailyData || dailyData.length === 0) {
                UI.setHTML('calendarGrid', '<div class="col-span-7 py-8 text-center text-slate-400 text-xs">No data available for this month.</div>');
                return;
            }

            // Map months string to index
            const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            const monthIndex = monthNames.indexOf(m);

            // First day of the month
            const firstDay = new Date(Number(y), monthIndex, 1).getDay(); // 0 (Sun) to 6 (Sat)
            const daysInMonth = dailyData.length;

            let maxSales = 0;
            let minSales = Infinity;
            let maxIdx = -1;
            let minIdx = -1;

            dailyData.forEach((d, i) => {
                if (d.net > maxSales) { maxSales = d.net; maxIdx = i; }
                if (d.net < minSales && d.net > 0) { minSales = d.net; minIdx = i; } // skip 0 for worst day
            });

            // Update Insight Cards
            if (maxIdx !== -1) {
                const bestDate = new Date(Number(y), monthIndex, maxIdx + 1);
                UI.setText('calBestDay', bestDate.toLocaleDateString('en-US', { weekday: 'short', day: 'numeric' }));
                UI.setText('calBestDaySales', HELPERS.formatIDR(maxSales) + ' (' + dailyData[maxIdx].qty + ' pcs)');
            } else {
                UI.setText('calBestDay', '-'); UI.setText('calBestDaySales', '-');
            }

            if (minIdx !== -1) {
                const worstDate = new Date(Number(y), monthIndex, minIdx + 1);
                UI.setText('calWorstDay', worstDate.toLocaleDateString('en-US', { weekday: 'short', day: 'numeric' }));
                UI.setText('calWorstDaySales', HELPERS.formatIDR(minSales) + ' (' + dailyData[minIdx].qty + ' pcs)');
            } else {
                UI.setText('calWorstDay', '-'); UI.setText('calWorstDaySales', '-');
            }

            // Best Day of the Week calculation
            const dowTotals = [0, 0, 0, 0, 0, 0, 0];
            const dowCounts = [0, 0, 0, 0, 0, 0, 0];
            dailyData.forEach((d, i) => {
                const date = new Date(Number(y), monthIndex, i + 1);
                const w = date.getDay();
                dowTotals[w] += d.net;
                if (d.net > 0) dowCounts[w]++;
            });
            let bestDowAvg = 0;
            let bestDowIdx = -1;
            for (let i = 0; i < 7; i++) {
                if (dowCounts[i] > 0) {
                    let avg = dowTotals[i] / dowCounts[i];
                    if (avg > bestDowAvg) { bestDowAvg = avg; bestDowIdx = i; }
                }
            }
            const dowNames = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
            if (bestDowIdx !== -1) {
                UI.setText('calBestDOW', dowNames[bestDowIdx]);
            } else {
                UI.setText('calBestDOW', '-');
            }

            // Generate Grid HTML
            let gridHtml = '';
            // Padding for the start of the month
            for (let i = 0; i < firstDay; i++) {
                gridHtml += `<div class="aspect-square rounded-md bg-transparent"></div>`;
            }

            // Render Days
            for (let i = 0; i < daysInMonth; i++) {
                const dayData = dailyData[i];
                const isHoliday = data.holidays && data.holidays[i + 1] ? data.holidays[i + 1] : "";
                const isWeekend = (firstDay + i) % 7 === 0 || (firstDay + i) % 7 === 6;

                let intensity = 0;
                if (maxSales > 0) intensity = dayData.net / maxSales;

                // Choose color bucket
                let bgClass = 'bg-slate-50 border border-slate-100 text-slate-400';
                let hoverClass = 'hover:border-slate-300';
                let textClass = 'text-slate-400 text-lg';
                let numberClass = '';

                if (dayData.net > 0) {
                    if (intensity > 0.8) { bgClass = 'bg-emerald-700 border-none'; textClass = 'text-emerald-50'; }
                    else if (intensity > 0.6) { bgClass = 'bg-emerald-500 border-none'; textClass = 'text-emerald-50'; }
                    else if (intensity > 0.4) { bgClass = 'bg-emerald-400 border-none'; textClass = 'text-emerald-900'; }
                    else if (intensity > 0.2) { bgClass = 'bg-emerald-300 border-none'; textClass = 'text-emerald-900'; }
                    else { bgClass = 'bg-emerald-200 border-none'; textClass = 'text-emerald-800'; }
                    hoverClass = 'hover:ring-2 hover:ring-offset-2 hover:ring-opacity-50 hover:ring-emerald-500 cursor-pointer shadow-sm';
                    numberClass = 'font-bold';
                } else if (isWeekend || isHoliday) {
                    bgClass = 'bg-rose-50 border border-rose-100';
                    textClass = 'text-rose-400';
                }

                // Tooltip content
                const dateStr = `${i + 1} ${m.substr(0, 3)}`;
                let tooltipObj = `Sales: ${HELPERS.formatIDR(dayData.net)}<br/>Qty: ${dayData.qty}`;
                if (isHoliday) tooltipObj += `<br/>${isHoliday}`;

                gridHtml += `
                <div class="group relative aspect-square rounded-md flex flex-col items-center justify-center transition-all duration-200 ${bgClass} ${hoverClass}">

            } else {
                UI.setText('sapKpiTopQtyName', '-');
                UI.setText('sapKpiTopQtyVal', '-');
            }
            if (data.topCat && data.topCat.length > 0) {
                UI.setText('sapKpiTopCatName', data.topCat[0].name);
                UI.setText('sapKpiTopCatNet', HELPERS.formatIDR(data.topCat[0].net));
            } else {
                UI.setText('sapKpiTopCatName', '-');
                UI.setText('sapKpiTopCatNet', '-');
            }
            if (data.topColl && data.topColl.length > 0) {
                UI.setText('sapKpiTopCollName', data.topColl[0].name);
                UI.setText('sapKpiTopCollNet', HELPERS.formatIDR(data.topColl[0].net));
            } else {
                UI.setText('sapKpiTopCollName', '-');
                UI.setText('sapKpiTopCollNet', '-');
            }

            // Podium Visual Helper
            const getRankBadge = (idx) => {
                if (idx === 0) return `<div class="w-6 h-6 rounded-full bg-amber-100 text-amber-600 flex items-center justify-center font-bold text-[10px] border border-amber-200 shadow-sm mx-auto">1</div>`;
                if (idx === 1) return `<div class="w-6 h-6 rounded-full bg-slate-100 text-slate-600 flex items-center justify-center font-bold text-[10px] border border-slate-300 shadow-sm mx-auto">2</div>`;
                if (idx === 2) return `<div class="w-6 h-6 rounded-full bg-orange-50 text-orange-700 flex items-center justify-center font-bold text-[10px] border border-orange-200 shadow-sm mx-auto">3</div>`;
                return `<div class="w-6 h-6 rounded-full text-slate-400 flex items-center justify-center font-bold text-[10px] mx-auto">${idx + 1}</div>`;
            };

            const renderTable = (id, items, cols) => {
                let html = "";
                if (items && items.length > 0) {
                    const maxVal = Math.max(...items.map(i => i.net || i.qty || 0));
                    items.forEach((item, idx) => { html += cols(item, idx, maxVal); });
                } else {
                    html = `<tr><td colspan="4" class="py-8 text-center text-slate-400 text-xs">No data available</td></tr>`;
                }
                UI.setHTML(id, html);
            };

            renderTable('sapTableQty', data.topSapQty, (item, idx, max) => {
                const pct = max > 0 ? (item.qty / max) * 100 : 0;
                return `<tr class="hover:bg-slate-50 transition-colors border-b border-slate-50 last:border-0 group"><td class="py-3 px-2 text-center align-middle">${getRankBadge(idx)}</td><td class="py-3 px-5 font-mono text-xs font-bold text-brand-blue group-hover:text-blue-700 transition-colors">${item.sap}</td><td class="py-3 px-5 text-xs text-slate-600"><span class="block font-bold">${item.category}</span><span class="inline-block mt-0.5 text-[9px] bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded border border-slate-200">${item.collection}</span></td><td class="py-3 px-5 align-middle w-1/3"><div class="flex items-center justify-end gap-3"><span class="font-bold text-brand-dark text-sm">${item.qty}</span><div class="w-16 h-1.5 bg-slate-100 rounded-full overflow-hidden shrink-0"><div class="h-full bg-blue-500 rounded-full" style="width: ${pct}%"></div></div></div></td></tr>`;
            });

            renderTable('sapTableVal', data.topSapVal, (item, idx, max) => {
                const pct = max > 0 ? (item.net / max) * 100 : 0;
                return `<tr class="hover:bg-slate-50 transition-colors border-b border-slate-50 last:border-0 group"><td class="py-3 px-2 text-center align-middle">${getRankBadge(idx)}</td><td class="py-3 px-5 font-mono text-xs font-bold text-brand-blue group-hover:text-blue-700 transition-colors">${item.sap}</td><td class="py-3 px-5 text-xs text-slate-600"><span class="block font-bold">${item.category}</span><span class="inline-block mt-0.5 text-[9px] bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded border border-slate-200">${item.collection}</span></td><td class="py-3 px-5 align-middle w-1/3"><div class="flex flex-col items-end gap-1"><span class="font-mono font-bold text-emerald-600 text-xs">${HELPERS.formatIDR(item.net)}</span><div class="w-20 h-1 bg-slate-100 rounded-full overflow-hidden shrink-0"><div class="h-full bg-emerald-500 rounded-full" style="width: ${pct}%"></div></div></div></td></tr>`;
            });

            renderTable('sapTableCat', data.topCat, (item, idx, max) => {
                const pct = max > 0 ? (item.net / max) * 100 : 0;
                return `<tr class="hover:bg-slate-50 transition-colors border-b border-slate-50 last:border-0 group"><td class="py-3 px-2 text-center align-middle">${getRankBadge(idx)}</td><td class="py-3 px-5 font-bold text-xs text-slate-700 group-hover:text-purple-700 transition-colors">${item.name}</td><td class="py-3 px-5 text-center text-xs text-slate-500 font-medium align-middle">${item.qty}</td><td class="py-3 px-5 align-middle"><div class="flex flex-col items-end gap-1"><span class="font-mono font-bold text-purple-600 text-xs">${HELPERS.formatIDR(item.net)}</span><div class="w-20 h-1 bg-slate-100 rounded-full overflow-hidden shrink-0"><div class="h-full bg-purple-500 rounded-full" style="width: ${pct}%"></div></div></div></td></tr>`;
            });

            renderTable('sapTableColl', data.topColl, (item, idx, max) => {
                const pct = max > 0 ? (item.net / max) * 100 : 0;
                return `<tr class="hover:bg-slate-50 transition-colors border-b border-slate-50 last:border-0 group"><td class="py-3 px-2 text-center align-middle">${getRankBadge(idx)}</td><td class="py-3 px-5 font-bold text-xs text-slate-700 group-hover:text-amber-700 transition-colors">${item.name}</td><td class="py-3 px-5 text-center text-xs text-slate-500 font-medium align-middle">${item.qty}</td><td class="py-3 px-5 align-middle"><div class="flex flex-col items-end gap-1"><span class="font-mono font-bold text-amber-600 text-xs">${HELPERS.formatIDR(item.net)}</span><div class="w-20 h-1 bg-slate-100 rounded-full overflow-hidden shrink-0"><div class="h-full bg-amber-500 rounded-full" style="width: ${pct}%"></div></div></div></td></tr>`;
            });

            renderTable('sapTableCatalogue', data.topCatalogue, (item, idx, max) => {
                const pct = max > 0 ? (item.net / max) * 100 : 0;
                return `<tr class="hover:bg-slate-50 transition-colors border-b border-slate-50 last:border-0 group"><td class="py-3 px-2 text-center align-middle">${getRankBadge(idx)}</td><td class="py-3 px-5 font-mono text-xs font-bold text-red-600 group-hover:text-red-700 transition-colors">${item.name}</td><td class="py-3 px-5 text-center text-xs text-slate-500 font-medium align-middle">${item.qty}</td><td class="py-3 px-5 align-middle"><div class="flex flex-col items-end gap-1"><span class="font-mono font-bold text-slate-700 text-xs">${HELPERS.formatIDR(item.net)}</span><div class="w-20 h-1 bg-slate-100 rounded-full overflow-hidden shrink-0"><div class="h-full bg-slate-500 rounded-full" style="width: ${pct}%"></div></div></div></td></tr>`;
            });
        },

        quarterlyBudget: (data) => {
            UI.showLoader(false);
            if (data.error) { UI.showToast(data.error); return; }

            // Set KPI Cards
            document.getElementById('qbTotalActual').textContent = HELPERS.formatIDR(data.kpi.totalActual);
            document.getElementById('qbTotalBudget').textContent = HELPERS.formatIDR(data.kpi.totalBudget);

            const varianceEl = document.getElementById('qbTotalVariance');
            varianceEl.textContent = HELPERS.formatIDR(data.kpi.totalVariance);
            varianceEl.className = `text-lg lg:text-xl font-display font-bold tracking-tight ${data.kpi.totalVariance >= 0 ? 'text-emerald-500' : 'text-red-500'}`;

            document.getElementById('qbTotalAchievement').textContent = data.kpi.totalAchievement.toFixed(1) + '%';

            // Populate Store Table
            const tbody = document.getElementById('quarterlyBudgetTableBody');
            if (!data.storeData || data.storeData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="text-center py-8 text-slate-400">No Budget Data Found</td></tr>`;
                return;
            }

            let html = '';
            data.storeData.forEach(store => {
                const isUnder = !store.isAchieved;
                const varColor = isUnder ? 'text-red-500' : 'text-emerald-500';
                const varSign = store.variance > 0 ? '+' : '';

                // Progress Bar styling
                let progColor = 'bg-brand-blue';
                if (store.achievement >= 100) progColor = 'bg-emerald-500';
                if (store.achievement < 80) progColor = 'bg-amber-500';
                if (store.achievement < 50) progColor = 'bg-red-500';

                html += `
                    <tr class="hover:bg-slate-50 transition-colors">
                        <td class="py-3 px-5 font-bold text-brand-dark">${store.store}</td>
                        <td class="py-3 px-5 text-right font-medium">${HELPERS.formatIDR(store.actual)}</td>
                        <td class="py-3 px-5 text-right text-slate-500">${HELPERS.formatIDR(store.budget)}</td>
                        <td class="py-3 px-5 text-right font-bold ${varColor}">${varSign}${HELPERS.formatIDR(store.variance)}</td>
                        <td class="py-3 px-5">
                            <div class="flex items-center justify-between gap-3">
                                <span class="text-xs font-bold w-12 text-right ${isUnder ? 'text-red-600' : 'text-emerald-600'}">${store.achievement.toFixed(1)}%</span>
                                <div class="w-full bg-slate-100 rounded-full h-2 overflow-hidden shadow-inner flex-grow">
                                    <div class="${progColor} h-2 rounded-full transition-all duration-1000" style="width: ${Math.min(100, Math.max(0, store.achievement))}%"></div>
                                </div>
                            </div>
                        </td>
                    </tr>
                `;
            });
            tbody.innerHTML = html;

            // Populate Monthly Breakdown Table
            const mBody = document.getElementById('quarterlyBudgetMonthlyTableBody');

            // Set Dynamic Month Headers
            if (data.monthNames && data.monthNames.length === 3) {
                document.getElementById('qbhM1').textContent = data.monthNames[0];
                document.getElementById('qbhM2').textContent = data.monthNames[1];
                document.getElementById('qbhM3').textContent = data.monthNames[2];
            }

            let mHtml = '';
            data.storeData.forEach(store => {
                const mb = store.monthlyBreakdown;
                if (!mb) return;

                const getAchvColor = (achv) => {
                    if (achv >= 100) return 'text-emerald-600';
                    if (achv >= 80) return 'text-amber-500';
                    return 'text-red-500';
                };

                const getMCol = (m) => {
                    const color = getAchvColor(m.achievement);
                    return `
                        <td class="py-2 px-3 text-right font-medium border-r border-slate-100">${HELPERS.formatIDR(m.actual)}</td>
                        <td class="py-2 px-3 text-right text-slate-500 border-r border-slate-100">${HELPERS.formatIDR(m.budget)}</td>
                        <td class="py-2 px-3 text-right font-bold ${color} border-r border-slate-200">${m.achievement.toFixed(1)}%</td>
                    `;
                };

                const qAchvColor = getAchvColor(store.achievement);

                mHtml += `
                    <tr class="hover:bg-slate-50 transition-colors">
                        <td class="py-2 px-5 font-bold text-brand-dark text-left border-r border-slate-200">${store.store}</td>
                        ${getMCol(mb.m1)}
                        ${getMCol(mb.m2)}
                        ${getMCol(mb.m3)}
                        <td class="py-2 px-3 font-bold text-center bg-slate-50 ${qAchvColor}">${store.achievement.toFixed(1)}%</td>
                    </tr>
                `;
            });
            mBody.innerHTML = mHtml;
        },

        crossingSales: (res) => {
            if (res.error) { UI.showToast(res.error); UI.showLoader(false); return; }

            // Summary KPIs (Total generated for the month)
            document.getElementById('crossTotalNet').innerText = res.totalNetSalesGenerated > 0 ? HELPERS.formatIDR(res.totalNetSalesGenerated) : "-";
            document.getElementById('crossTotalQty').innerText = res.totalNetQtyGenerated || "-";

            // Render Excluded HO Crossing if present
            const hoNetEl = document.getElementById('crossHONet');
            if (hoNetEl) {
                if (res.hoCrossingNet && res.hoCrossingNet > 0) {
                    hoNetEl.innerText = `+ Excluded HO: ${HELPERS.formatIDR(res.hoCrossingNet)}`;
                    hoNetEl.classList.remove('hidden');
                } else {
                    hoNetEl.classList.add('hidden');
                }
            }

            const hoQtyEl = document.getElementById('crossHOQty');
            if (hoQtyEl) {
                if (res.hoCrossingQty && res.hoCrossingQty > 0) {
                    hoQtyEl.innerText = `+ Excluded HO: ${res.hoCrossingQty} pcs`;
                    hoQtyEl.classList.remove('hidden');
                } else {
                    hoQtyEl.classList.add('hidden');
                }
            }

            // Store Adjustments
            const updateStoreKpi = (prefix, data) => {
                const adjEl = document.getElementById(`kpi${prefix}Adj`);
                const physEl = document.getElementById(`kpi${prefix}Phys`);
                const badgeEl = document.getElementById(`${prefix.toLowerCase()}VarBadge`);
                const impactEl = document.getElementById(`kpi${prefix}Impact`);

                if (!adjEl || !physEl || !data) return;

                adjEl.innerText = HELPERS.formatIDR(data.adjusted);
                physEl.innerText = HELPERS.formatIDR(data.physical);

                const variance = data.physical > 0 ? ((data.adjusted - data.physical) / data.physical) * 100 : 0;
                const delta = data.adjusted - data.physical;

                // Chevron SVGs
                const svgUp = `<svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 15l7-7 7 7"></path></svg>`;
                const svgDown = `<svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"></path></svg>`;
                const svgDash = `<svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M20 12H4"></path></svg>`;

                if (variance > 0) {
                    badgeEl.innerHTML = `${svgUp} <span>${variance.toFixed(1)}%</span>`;
                    badgeEl.className = "flex items-center gap-1 text-[10px] font-bold px-2 py-0.5 rounded-full bg-emerald-50 text-emerald-600 border border-emerald-100 shadow-sm";
                    if (impactEl) {
                        impactEl.innerText = `+ ${HELPERS.formatIDR(Math.abs(delta))}`;
                        impactEl.className = "text-[11px] font-bold mt-1 text-emerald-600";
                    }
                } else if (variance < 0) {
                    badgeEl.innerHTML = `${svgDown} <span>${Math.abs(variance).toFixed(1)}%</span>`;
                    badgeEl.className = "flex items-center gap-1 text-[10px] font-bold px-2 py-0.5 rounded-full bg-red-50 text-red-600 border border-red-100 shadow-sm";
                    if (impactEl) {
                        impactEl.innerText = `- ${HELPERS.formatIDR(Math.abs(delta))}`;
                        impactEl.className = "text-[11px] font-bold mt-1 text-red-600";
                    }
                } else {
                    badgeEl.innerHTML = `${svgDash} <span>0.0%</span>`;
                    badgeEl.className = "flex items-center gap-1 text-[10px] font-bold px-2 py-0.5 rounded-full bg-slate-50 text-slate-400 border border-slate-100 shadow-sm";
                    if (impactEl) {
                        impactEl.innerText = `No Impact`;
                        impactEl.className = "text-[11px] font-bold mt-1 text-slate-400";
                    }
                }
            };

            updateStoreKpi("Pi", res.storeStats["Plaza Indonesia"]);
            updateStoreKpi("Ps", res.storeStats["Plaza Senayan"]);
            updateStoreKpi("Bali", res.storeStats["Bali"]);

            // Populate Table
            let tbody = "";
            if (!res.records || res.records.length === 0) {
                tbody = `<tr><td colspan="6" class="p-8 text-center text-slate-400">No crossing sales detected for this period.</td></tr>`;
            } else {
                res.records.forEach(r => {
                    tbody += `
                    <tr class="hover:bg-slate-50 transition-colors group">
                        <td class="py-3 px-5 border-b border-slate-50">
                            <span class="font-bold text-slate-700">${r.salesman}</span>
                        </td>
                        <td class="py-3 px-5 border-b border-slate-50 text-slate-500">${r.baseLoc}</td>
                        <td class="py-3 px-3 border-b border-slate-50 text-center text-slate-300">
                            <svg class="w-4 h-4 mx-auto group-hover:text-brand-blue group-hover:translate-x-1 transition-all" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3" />
                            </svg>
                        </td>
                        <td class="py-3 px-5 border-b border-slate-50">
                            <span class="font-bold text-amber-600 bg-amber-50 px-3 py-1 rounded-full text-xs border border-amber-100">${r.crossingLoc}</span>
                        </td>
                        <td class="py-3 px-5 border-b border-slate-50 text-right">
                            <span class="font-mono font-bold text-brand-dark">${HELPERS.formatIDR(r.net)}</span>
                        </td>
                        <td class="py-3 px-5 border-b border-slate-50 text-center">
                            <span class="font-mono text-slate-600">${r.qty}</span>
                        </td>
                    </tr>`;
                });
            }

            UI.setHTML('crossingTableBody', tbody);
            UI.showLoader(false);
            document.getElementById('loaderText').innerText = "Processing Data...";
        }
    };

    // ==========================================
    // 7. CHARTS (Extracted)
    // ==========================================
    // The CHARTS object and its methods have been extracted to 'JavaScript_Charts.html'.

    // ==========================================
    // 8. INITIALIZATION
    // ==========================================
    document.addEventListener('DOMContentLoaded', () => {
        UI.initDefaults();
        APP.switchTab('monthly'); // Load default tab
    });
</script>
