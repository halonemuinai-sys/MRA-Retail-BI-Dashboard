<script>
    // ============================================================
    // APP CONTROLLER — Helpdesk IT (Mobile / Store Staff)
    // ============================================================
    var APP = {
        currentUser: null,
        allUsers: [],
        allTickets: [],
        categories: [],
        itStaff: [],
        selectedMonth: new Date().getMonth(),
        selectedYear: new Date().getFullYear(),
        autoRefreshTimer: null,

        // ---- UI TABS ----
        switchTab: function(tab) {
            document.getElementById('viewSummary').classList.add('hidden');
            document.getElementById('viewTickets').classList.add('hidden');
            
            document.getElementById('tabSummary').classList.replace('text-brand-blue', 'text-slate-400');
            document.getElementById('tabTickets').classList.replace('text-brand-blue', 'text-slate-400');
            
            if (tab === 'summary') {
                document.getElementById('viewSummary').classList.remove('hidden');
                document.getElementById('tabSummary').classList.replace('text-slate-400', 'text-brand-blue');
            } else {
                document.getElementById('viewTickets').classList.remove('hidden');
                document.getElementById('tabTickets').classList.replace('text-slate-400', 'text-brand-blue');
            }
        },

        // ---- INIT ----
        init: function() {
            // Load user list
            google.script.run
                .withSuccessHandler(function(res) {
                    var storeSel = document.getElementById('loginStore');
                    var nameSel = document.getElementById('loginSelect');
                    storeSel.innerHTML = '<option value="" disabled selected>-- Pilih Lokasi --</option>';
                    nameSel.innerHTML = '<option value="" disabled selected>Pilih Lokasi Dulu</option>';
                    if (res && res.ok) {
                        APP.allUsers = res.users;
                        var stores = [];
                        for (var i = 0; i < res.users.length; i++) {
                            var s = res.users[i].store;
                            if (s && stores.indexOf(s) === -1) stores.push(s);
                        }
                        stores.sort();
                        for (var i = 0; i < stores.length; i++) {
                            storeSel.innerHTML += '<option value="' + stores[i] + '">' + stores[i] + '</option>';
                        }
                    } else {
                        APP.toast("Gagal muat lokasi: " + (res ? res.msg : 'Unknown'));
                    }
                })
                .withFailureHandler(function(err) { APP.toast('Koneksi Error: ' + err.message); })
                .getUsers();

            // Load categories
            google.script.run
                .withSuccessHandler(function(res) {
                    if (res && res.ok) APP.categories = res.list;
                    APP.populateCategoryDropdown();
                })
                .getCategories();

            // Load IT Staff (for assign dropdown)
            google.script.run
                .withSuccessHandler(function(res) {
                    if (res && res.ok) APP.itStaff = res.list;
                })
                .getStaff();

            APP.initFilters();
        },

        initFilters: function() {
            var mSel = document.getElementById('filterMonth');
            var ySel = document.getElementById('filterYear');
            if (!mSel || !ySel) return;
            var months = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
            mSel.innerHTML = '';
            for (var i = 0; i < months.length; i++) {
                mSel.innerHTML += '<option value="' + i + '">' + months[i] + '</option>';
            }
            mSel.value = APP.selectedMonth;
            
            ySel.innerHTML = '';
            for (var y = APP.selectedYear - 2; y <= APP.selectedYear + 1; y++) {
                ySel.innerHTML += '<option value="' + y + '">' + y + '</option>';
            }
            ySel.value = APP.selectedYear;
        },

        populateCategoryDropdown: function() {
            var sel = document.getElementById('formCategory');
            if (!sel) return;
            sel.innerHTML = '<option value="" disabled selected>Pilih Kategori...</option>';
            for (var i = 0; i < APP.categories.length; i++) {
                var c = APP.categories[i];
                var lbl = typeof c === 'object' ? c.label : c;
                sel.innerHTML += '<option value="' + lbl + '">' + lbl + '</option>';
            }
        },

        populateAssignDropdown: function() {
            var sel = document.getElementById('formAssignTo');
            if (!sel) return;
            sel.innerHTML = '<option value="">— Belum Ditugaskan —</option>';
            for (var i = 0; i < APP.itStaff.length; i++) {
                var s = APP.itStaff[i];
                var lbl = typeof s === 'object' ? s.name : s;
                sel.innerHTML += '<option value="' + lbl + '">' + lbl + '</option>';
            }
        },

        onStoreChange: function() {
            var store = document.getElementById('loginStore').value;
            var nameSel = document.getElementById('loginSelect');
            nameSel.innerHTML = '<option value="" disabled selected>-- Pilih Nama --</option>';
            if (!store) { nameSel.disabled = true; return; }
            for (var i = 0; i < APP.allUsers.length; i++) {
                if (APP.allUsers[i].store === store) {
                    nameSel.innerHTML += '<option value="' + APP.allUsers[i].name + '">' + APP.allUsers[i].name + '</option>';
                }
            }
            nameSel.disabled = false;
        },

        // ---- AUTH ----
        login: function() {
            var name = document.getElementById('loginSelect').value;
            var pin = document.getElementById('loginPin').value;
            if (!name) { APP.toast('Pilih nama Anda'); return; }
            if (!pin) { APP.toast('Masukkan PIN'); return; }

            var btn = document.getElementById('btnLogin');
            btn.disabled = true; btn.textContent = 'Memverifikasi...';

            google.script.run
                .withSuccessHandler(function(res) {
                    btn.disabled = false; btn.textContent = 'MASUK';
                    if (res && res.ok) {
                        APP.currentUser = res.user;
                        document.getElementById('loginScreen').classList.add('hidden');
                        document.getElementById('mainApp').classList.remove('hidden');
                        document.getElementById('headerStore').textContent = res.user.store;
                        document.getElementById('headerName').textContent = res.user.name;

                        APP.loadTickets();

                        // Auto-refresh 60s
                        if (APP.autoRefreshTimer) clearInterval(APP.autoRefreshTimer);
                        APP.autoRefreshTimer = setInterval(function() {
                            if (APP.currentUser) {
                                google.script.run
                                    .withSuccessHandler(function(r) { 
                                        if (r && r.ok) { APP.allTickets = r.tickets; APP.renderTickets(r.tickets); } 
                                    })
                                    .getTickets(APP.currentUser.store, APP.currentUser.role, APP.selectedMonth, APP.selectedYear);
                            }
                        }, 60000);
                    } else { APP.toast(res ? res.msg : 'Server error'); }
                })
                .withFailureHandler(function(err) { btn.disabled = false; btn.textContent = 'MASUK'; APP.toast('Error: ' + err.message); })
                .login(name, pin);
        },

        logout: function() {
            if (APP.autoRefreshTimer) clearInterval(APP.autoRefreshTimer);
            APP.currentUser = null;
            document.getElementById('mainApp').classList.add('hidden');
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('loginStore').value = '';
            document.getElementById('loginSelect').innerHTML = '<option value="" disabled selected>Pilih Lokasi Dulu</option>';
            document.getElementById('loginSelect').disabled = true;
            document.getElementById('loginPin').value = '';
        },

        // ---- UTILS ----
        showLoader: function() { var l = document.getElementById('globalLoader'); if (l) { l.classList.remove('hidden'); l.style.display = 'flex'; } },
        hideLoader: function() { var l = document.getElementById('globalLoader'); if (l) { l.classList.add('hidden'); l.style.display = ''; } },
        toast: function(msg) { var t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(function() { t.classList.remove('show'); }, 3000); },

        // ---- TICKETS ----
        loadTickets: function() {
            if (!APP.currentUser) return;
            var mSel = document.getElementById('filterMonth');
            var ySel = document.getElementById('filterYear');
            if (mSel && ySel) { APP.selectedMonth = parseInt(mSel.value); APP.selectedYear = parseInt(ySel.value); }

            APP.showLoader();
            google.script.run
                .withSuccessHandler(function(res) {
                    APP.hideLoader();
                    if (res && res.ok) { APP.allTickets = res.tickets; APP.renderTickets(res.tickets); }
                    else { document.getElementById('ticketContainer').innerHTML = '<div class="card p-8 text-center text-red-500 text-sm">Gagal: ' + (res ? res.msg : 'Server Error') + '</div>'; }
                })
                .withFailureHandler(function(err) { APP.hideLoader(); document.getElementById('ticketContainer').innerHTML = '<div class="card p-8 text-center text-red-500 text-sm">Error: ' + err.message + '</div>'; })
                .getTickets(APP.currentUser.store, APP.currentUser.role, APP.selectedMonth, APP.selectedYear);
        },

        renderTickets: function(tickets) {
            var cnt = document.getElementById('ticketContainer');
            var h = 0, m = 0, lo = 0;
            var resolved = 0, pending = 0;
            
            for (var i = 0; i < tickets.length; i++) {
                var t = tickets[i];
                if (t.status === 'Resolved') {
                    resolved++;
                } else {
                    pending++;
                    if (t.priority === 'High') h++; 
                    else if (t.priority === 'Medium') m++; 
                    else lo++;
                }
            }

            document.getElementById('totalMyTickets').textContent = tickets.length;
            document.getElementById('countResolved').textContent = resolved;
            document.getElementById('countPending').textContent = pending;

            document.getElementById('countHigh').textContent = h;
            document.getElementById('countMed').textContent = m;
            document.getElementById('countLow').textContent = lo;

            if (!tickets.length) { cnt.innerHTML = '<div class="card p-8 text-center text-slate-400 text-sm font-medium">Tidak ada tiket ditemukan.</div>'; return; }

            var html = '';
            for (var i = 0; i < tickets.length; i++) {
                var t = tickets[i];
                var sc = t.sla ? ('sla-' + (t.sla.color || 'gray')) : 'sla-gray';
                var slaText = t.sla ? t.sla.text : '-';
                var statusBg = t.status === 'Resolved' ? 'bg-emerald-50 text-emerald-600' : (t.status === 'Open' ? 'bg-amber-50 text-amber-600' : 'bg-blue-50 text-blue-600');
                var prioIcon = t.priority === 'High' ? '🔴' : (t.priority === 'Medium' ? '🟡' : '🟢');
                
                // Compatibility for either assignedTo or assigned
                var assigned = t.assignedTo || t.assigned || '';
                var assignBadge = assigned ? '<span class="text-[9px] bg-violet-50 text-violet-600 px-1.5 py-0.5 rounded font-bold">👤 ' + assigned + '</span>' : '';
                
                // Compatibility for description vs desc
                var desc = t.description || t.desc || '';
                // reporter vs reportedBy
                var reporter = t.reportedBy || t.reporter || '';
                // createdAt vs date
                var date = t.createdAt || t.date || '';

                html += '<div class="card p-5 hover:shadow-md transition-shadow cursor-pointer" onclick="APP.viewTicket(\'' + t.id + '\')">' +
                    '<div class="flex justify-between items-start mb-2">' +
                        '<div class="pr-3 flex-1 min-w-0">' +
                            '<div class="flex items-center gap-2 mb-1">' +
                                '<p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">' + t.id + '</p>' +
                                assignBadge +
                            '</div>' +
                            '<p class="font-bold text-slate-800 text-sm leading-tight truncate">' + t.category + '</p>' +
                            '<p class="text-[11px] text-slate-500 mt-0.5 truncate">' + desc + '</p>' +
                            '<p class="text-[10px] text-slate-400 mt-1">Oleh: ' + reporter + ' • ' + date + '</p>' +
                        '</div>' +
                        '<span class="px-2.5 py-1 rounded-lg text-[10px] font-bold uppercase whitespace-nowrap ' + statusBg + '">' + t.status + '</span>' +
                    '</div>' +
                    '<div class="flex justify-between items-center mt-3 pt-3 border-t border-slate-100">' +
                        '<span class="text-[10px] font-bold text-slate-600">' + prioIcon + ' ' + t.priority + '</span>' +
                        '<span class="text-[9px] font-bold px-2 py-0.5 border rounded-md ' + sc + '">SLA: ' + slaText + '</span>' +
                    '</div>' +
                    (t.notes ? '<div class="mt-2 bg-blue-50/50 p-2 text-[10px] rounded border border-blue-100 truncate"><b class="text-blue-600">IT:</b> ' + t.notes + '</div>' : '') +
                '</div>';
            }
            cnt.innerHTML = html;
        },

        // ---- VIEW TICKET (Detail Modal or Edit) ----
        viewTicket: function(id) {
            var t = null;
            for (var i = 0; i < APP.allTickets.length; i++) {
                if (APP.allTickets[i].id === id) { t = APP.allTickets[i]; break; }
            }
            if (!t) return;

            var isAdmin = APP.currentUser.role === 'admin' || APP.currentUser.role === 'it';

            if (isAdmin) {
                APP.editTicket(t);
            } else {
                var sc = t.sla ? ('sla-' + (t.sla.color || 'gray')) : 'sla-gray';
                var slaText = t.sla ? t.sla.text : '-';
                var assigned = t.assignedTo || t.assigned || '';
                var desc = t.description || t.desc || '';
                var date = t.createdAt || t.date || '';
                var responded = t.respondedAt || t.responded || '-';
                var resolved = t.resolvedAt || t.resolved || '-';

                var body = document.getElementById('detailBody');
                body.innerHTML = 
                    '<p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">' + t.id + '</p>' +
                    '<h3 class="text-lg font-display font-bold text-slate-800 mb-4">' + t.category + '</h3>' +
                    '<div class="space-y-3 text-sm">' +
                        '<div class="flex justify-between"><span class="text-slate-400">Prioritas</span><span class="font-bold">' + t.priority + '</span></div>' +
                        '<div class="flex justify-between"><span class="text-slate-400">Status</span><span class="font-bold">' + t.status + '</span></div>' +
                        '<div class="flex justify-between"><span class="text-slate-400">Dibuat</span><span class="font-bold">' + date + '</span></div>' +
                        '<div class="flex justify-between"><span class="text-slate-400">Respon</span><span class="font-bold">' + responded + '</span></div>' +
                        '<div class="flex justify-between"><span class="text-slate-400">Selesai</span><span class="font-bold">' + resolved + '</span></div>' +
                        '<div class="flex justify-between"><span class="text-slate-400">SLA</span><span class="font-bold px-2 py-0.5 border rounded ' + sc + '">' + slaText + '</span></div>' +
                        (assigned ? '<div class="flex justify-between"><span class="text-slate-400">Ditangani</span><span class="font-bold">' + assigned + '</span></div>' : '') +
                        '<div class="pt-3 border-t border-slate-100">' +
                            '<p class="text-slate-400 text-xs mb-1">Deskripsi:</p>' +
                            '<p class="text-slate-700">' + desc + '</p>' +
                        '</div>' +
                        (t.notes ? '<div class="pt-3 border-t border-slate-100"><p class="text-slate-400 text-xs mb-1">Catatan IT:</p><p class="text-blue-700">' + t.notes + '</p></div>' : '') +
                    '</div>';

                document.getElementById('detailModal').classList.remove('hidden');
                setTimeout(function() { document.getElementById('detailModalContent').style.transform = 'translateY(0)'; }, 10);
            }
        },

        closeDetailModal: function() {
            document.getElementById('detailModalContent').style.transform = 'translateY(100%)';
            setTimeout(function() { document.getElementById('detailModal').classList.add('hidden'); }, 300);
        },

        // ---- TICKET MODAL (Create / Edit) ----
        showTicketModal: function() {
            document.getElementById('formTicketId').value = '';
            document.getElementById('formCategory').selectedIndex = 0;
            document.getElementById('formPriority').value = 'Low';
            document.getElementById('formDescription').value = '';
            document.getElementById('formStatus').value = 'Open';
            document.getElementById('formNotes').value = '';
            document.getElementById('modalTitle').textContent = 'Buat Tiket Baru';
            document.getElementById('modalSubtitle').textContent = 'Laporkan masalah IT yang Anda alami.';
            document.getElementById('btnSaveTicket').textContent = 'Kirim Laporan';
            document.getElementById('adminUpdateSection').classList.add('hidden');
            document.getElementById('formCategory').disabled = false;
            document.getElementById('formPriority').disabled = false;
            document.getElementById('formDescription').disabled = false;

            APP.populateCategoryDropdown();
            document.getElementById('ticketModal').classList.remove('hidden');
            setTimeout(function() { document.getElementById('ticketModalContent').style.transform = 'translateY(0)'; }, 10);
        },

        editTicket: function(t) {
            document.getElementById('formTicketId').value = t.id;
            APP.populateCategoryDropdown();
            setTimeout(function() { document.getElementById('formCategory').value = t.category; }, 50);
            document.getElementById('formPriority').value = t.priority;
            var desc = t.description || t.desc || '';
            document.getElementById('formDescription').value = desc;
            document.getElementById('formStatus').value = t.status;
            document.getElementById('formNotes').value = t.notes || '';
            document.getElementById('modalTitle').textContent = 'Update Tiket ' + t.id;
            document.getElementById('modalSubtitle').textContent = t.category + ' — ' + t.store;
            document.getElementById('btnSaveTicket').textContent = 'Simpan Update';

            var isAdmin = APP.currentUser.role === 'admin' || APP.currentUser.role === 'it';
            if (isAdmin) {
                document.getElementById('adminUpdateSection').classList.remove('hidden');
                document.getElementById('formCategory').disabled = true;
                document.getElementById('formPriority').disabled = true;
                document.getElementById('formDescription').disabled = true;
                APP.populateAssignDropdown();
                setTimeout(function() {
                    var asel = document.getElementById('formAssignTo');
                    var assigned = t.assignedTo || t.assigned || '';
                    if (asel && assigned) asel.value = assigned;
                }, 50);
            } else {
                document.getElementById('adminUpdateSection').classList.add('hidden');
            }

            document.getElementById('ticketModal').classList.remove('hidden');
            setTimeout(function() { document.getElementById('ticketModalContent').style.transform = 'translateY(0)'; }, 10);
        },

        closeTicketModal: function() {
            document.getElementById('ticketModalContent').style.transform = 'translateY(100%)';
            setTimeout(function() { document.getElementById('ticketModal').classList.add('hidden'); }, 300);
        },

        saveTicket: function() {
            var id = document.getElementById('formTicketId').value;
            var isUpdate = !!id;
            var cat = document.getElementById('formCategory').value;
            var prio = document.getElementById('formPriority').value;
            var desc = document.getElementById('formDescription').value;
            var status = document.getElementById('formStatus').value;
            var notes = document.getElementById('formNotes').value;
            var assignSel = document.getElementById('formAssignTo');
            var assignedTo = assignSel ? assignSel.value : '';

            if (!isUpdate && (!cat || !desc)) { APP.toast('Kategori dan Deskripsi wajib diisi'); return; }

            var btn = document.getElementById('btnSaveTicket');
            btn.disabled = true; btn.textContent = 'Menyimpan...';

            if (isUpdate) {
                // UPDATE FLOW (for admin)
                google.script.run
                    .withSuccessHandler(function(res) {
                        btn.disabled = false;
                        APP.closeTicketModal();
                        if (res && res.ok) {
                            APP.toast(res.msg);
                            APP.loadTickets();
                        } else { APP.toast('Error: ' + (res ? res.msg : 'Unknown server error')); }
                    })
                    .withFailureHandler(function(err) { btn.disabled = false; btn.textContent = 'Simpan Update'; APP.toast('Error: ' + err.message); })
                    .updateTicket(id, status, assignedTo, notes);
            } else {
                // CREATE NEW TICKET FLOW
                google.script.run
                    .withSuccessHandler(function(res) {
                        btn.disabled = false;
                        APP.closeTicketModal();
                        if (res && res.ok) {
                            APP.toast(res.msg);
                            // Reset filter to current month so new ticket is visible
                            var now = new Date();
                            APP.selectedMonth = now.getMonth();
                            APP.selectedYear = now.getFullYear();
                            var mSel = document.getElementById('filterMonth');
                            var ySel = document.getElementById('filterYear');
                            if (mSel) mSel.value = APP.selectedMonth;
                            if (ySel) ySel.value = APP.selectedYear;
                            
                            APP.loadTickets();
                            // Switch to ticket list view
                            APP.switchTab('tickets');
                        } else { APP.toast('Error: ' + (res ? res.msg : 'Unknown server error')); }
                    })
                    .withFailureHandler(function(err) { btn.disabled = false; btn.textContent = 'Kirim Laporan'; APP.toast('Error: ' + err.message); })
                    .createTicket(APP.currentUser.store, APP.currentUser.name, cat, desc, prio);
            }
        }
    };

    window.onload = APP.init;
</script>
