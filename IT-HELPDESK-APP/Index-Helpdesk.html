<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Helpdesk | MRA Retail</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: {
            colors: { 'bk':'#0f172a', 'bl':'#2563eb' },
            fontFamily: { 'dp':['Playfair Display','serif'], 'sn':['Inter','sans-serif'] }
        }}}
    </script>
    <style>
        body{font-family:'Inter',sans-serif;background:#f8fafc;-webkit-tap-highlight-color:transparent}
        .card{background:#fff;border:1px solid #e2e8f0;border-radius:20px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
        .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);background:#0f172a;color:#fff;padding:12px 24px;border-radius:12px;font-size:13px;font-weight:600;z-index:200;transition:transform .4s ease}
        .toast.show{transform:translateX(-50%) translateY(0)}
        .glass{background:rgba(255,255,255,.75);-webkit-backdrop-filter:blur(24px);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,1);box-shadow:0 25px 50px -12px rgba(0,0,0,.1)}
        .gi{background:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.8);color:#1e293b;transition:all .3s}
        .gi:focus{background:rgba(255,255,255,.9);border-color:#3b82f6;outline:none;box-shadow:0 0 0 4px rgba(59,130,246,.1)}
        select option{background:#fff;color:#1e293b}
        input,select,textarea{font-size:16px!important}
        @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
        @keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}
        .fu{animation:fadeUp .8s cubic-bezier(.16,1,.3,1) forwards;opacity:0}
        .d1{animation-delay:.1s}.d2{animation-delay:.2s}.d3{animation-delay:.3s}
        .sla-emerald{background:#ecfdf5;color:#059669;border:1px solid #a7f3d0}
        .sla-red{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
        .sla-amber{background:#fffbeb;color:#d97706;border:1px solid #fde68a}
        .sla-blue{background:#eff6ff;color:#2563eb;border:1px solid #bfdbfe}
        .sla-gray{background:#f8fafc;color:#64748b;border:1px solid #e2e8f0}
    </style>
</head>
<body class="text-slate-800 max-w-lg mx-auto relative min-h-screen">

<div id="toast" class="toast"></div>

<!-- ======== LOGIN ======== -->
<div id="loginScreen" class="flex flex-col items-center justify-center min-h-screen p-6 relative overflow-hidden">
    <div class="absolute inset-0 bg-gradient-to-br from-blue-50 to-slate-50"></div>
    <div class="absolute top-[5%] left-[-10%] w-72 h-72 bg-blue-300/40 rounded-full blur-[80px]" style="animation:fl 8s ease-in-out infinite"></div>

    <div class="mb-10 text-center relative z-10 fu">
        <h1 class="text-4xl font-dp font-bold tracking-widest text-slate-800">HELPDESK</h1>
        <p class="text-[11px] text-slate-500 mt-2 font-medium tracking-[.2em] uppercase">IT Support Portal</p>
    </div>

    <div class="w-full max-w-xs relative z-10 glass rounded-[2rem] p-7 fu d1">
        <div class="mb-5">
            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-[.2em] mb-2 ml-1">Lokasi Store</label>
            <select id="selStore" title="Lokasi" aria-label="Lokasi" onchange="APP.onStore()" class="w-full gi p-4 rounded-2xl font-semibold text-sm">
                <option value="" disabled selected>Memuat...</option>
            </select>
        </div>
        <div class="mb-5">
            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-[.2em] mb-2 ml-1">Nama</label>
            <select id="selName" title="Nama" aria-label="Nama" disabled class="w-full gi p-4 rounded-2xl font-semibold text-sm disabled:opacity-50">
                <option value="" disabled selected>Pilih Lokasi Dulu</option>
            </select>
        </div>
        <div class="mb-8">
            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-[.2em] mb-2 ml-1">PIN</label>
            <input type="password" id="inPin" maxlength="4" inputmode="numeric" placeholder="••••" class="w-full gi p-4 rounded-2xl font-bold text-center tracking-[1em] text-lg placeholder-slate-400">
        </div>
        <button onclick="APP.login()" id="btnLogin" class="w-full py-4 rounded-2xl font-bold text-white bg-bk shadow-lg active:scale-95 transition-all fu d3">MASUK</button>
    </div>
    <p class="absolute bottom-6 text-[10px] text-slate-400 font-medium tracking-wider z-10">MRA Retail IT Division</p>
</div>

<!-- ======== MAIN ======== -->
<div id="mainApp" class="hidden min-h-screen bg-slate-50">
    <!-- Loader -->
    <div id="loader" class="fixed inset-0 bg-white/70 z-[100] hidden items-center justify-center flex-col" style="-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px)">
        <div class="w-12 h-12 border-4 border-slate-200 border-t-bk rounded-full animate-spin mb-3"></div>
        <p class="text-xs font-bold text-bk uppercase tracking-widest animate-pulse">Memproses...</p>
    </div>

    <!-- Header -->
    <div class="bg-white p-5 pt-6 border-b border-slate-100 flex justify-between items-center sticky top-0 z-40">
        <div>
            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-[.15em]" id="hStore">—</p>
            <p class="text-lg font-dp font-bold text-bk" id="hName">—</p>
        </div>
        <div class="flex gap-2">
            <button onclick="APP.openNew()" class="h-9 px-3 bg-bl text-white rounded-full text-xs font-bold shadow-sm">+ TIKET BARU</button>
            <button onclick="APP.logout()" title="Logout" aria-label="Logout" class="h-9 w-9 bg-slate-100 rounded-full flex items-center justify-center text-slate-400 hover:bg-red-50 hover:text-red-500">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
            </button>
        </div>
    </div>

    <!-- Filter -->
    <div class="bg-white px-5 py-3 border-b border-slate-100 flex gap-2">
        <select id="fMonth" title="Bulan" aria-label="Bulan" onchange="APP.load()" class="flex-1 bg-slate-50 border border-slate-200 px-3 py-2 rounded-xl text-xs font-bold text-slate-600 outline-none"></select>
        <select id="fYear" title="Tahun" aria-label="Tahun" onchange="APP.load()" class="w-24 bg-slate-50 border border-slate-200 px-3 py-2 rounded-xl text-xs font-bold text-slate-600 outline-none"></select>
    </div>

    <!-- Metrics -->
    <div class="p-4">
        <div class="grid grid-cols-3 gap-3 mb-5">
            <div class="card p-4 text-center"><p class="text-2xl font-bold text-red-500" id="cH">0</p><p class="text-[9px] text-slate-400 font-bold uppercase mt-1">High</p></div>
            <div class="card p-4 text-center"><p class="text-2xl font-bold text-amber-500" id="cM">0</p><p class="text-[9px] text-slate-400 font-bold uppercase mt-1">Medium</p></div>
            <div class="card p-4 text-center"><p class="text-2xl font-bold text-emerald-500" id="cL">0</p><p class="text-[9px] text-slate-400 font-bold uppercase mt-1">Low</p></div>
        </div>

        <div class="flex justify-between items-center mb-4">
            <h2 class="text-base font-dp font-bold">Daftar Tiket</h2>
            <button onclick="APP.load()" class="text-xs text-bl font-bold px-2 py-1 bg-blue-50 rounded-lg">Refresh</button>
        </div>
        <div id="ticketList" class="space-y-4 pb-10">
            <div class="card p-8 text-center text-slate-400 text-sm">Memuat...</div>
        </div>
    </div>
</div>

<!-- ======== MODAL: New Ticket ======== -->
<div id="modal" class="fixed inset-0 z-50 hidden">
    <div class="absolute inset-0 bg-slate-900/40" style="-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px)" onclick="APP.closeModal()"></div>
    <div id="modalContent" class="absolute bottom-0 left-0 right-0 bg-white rounded-t-3xl p-6 shadow-2xl transform translate-y-full transition-transform duration-300 max-h-[90vh] overflow-y-auto">
        <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-6"></div>
        <h3 class="text-lg font-dp font-bold mb-1" id="modalTitle">Buat Tiket Baru</h3>
        <p class="text-xs text-slate-400 mb-5" id="modalSub">Laporkan masalah IT Anda</p>

        <div class="mb-4">
            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wide mb-2 ml-1">Kategori</label>
            <select id="fCat" title="Kategori" aria-label="Kategori" class="w-full bg-slate-50 border border-slate-200 p-3 rounded-xl text-sm font-semibold outline-none focus:border-bl">
                <option value="" disabled selected>Memuat...</option>
            </select>
        </div>
        <div class="mb-4">
            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wide mb-2 ml-1">Prioritas</label>
            <select id="fPrio" title="Prioritas" aria-label="Prioritas" class="w-full bg-slate-50 border border-slate-200 p-3 rounded-xl text-sm font-semibold outline-none focus:border-bl">
                <option value="Low">🟢 Low — Respon 1 Hari</option>
                <option value="Medium">🟡 Medium — Respon 4 Jam</option>
                <option value="High">🔴 High — Respon 30 Menit</option>
            </select>
        </div>
        <div class="mb-6">
            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wide mb-2 ml-1">Deskripsi Masalah</label>
            <textarea id="fDesc" rows="3" class="w-full bg-slate-50 border border-slate-200 p-3 rounded-xl text-sm outline-none focus:border-bl" placeholder="Jelaskan masalah yang dialami..."></textarea>
        </div>
        <div class="flex gap-3">
            <button onclick="APP.closeModal()" class="flex-1 py-4 bg-slate-100 text-slate-600 font-bold rounded-xl active:scale-95 transition-transform">Batal</button>
            <button onclick="APP.submit()" id="btnSubmit" class="flex-[2] py-4 bg-bl text-white font-bold rounded-xl shadow-lg shadow-blue-500/30 active:scale-95 transition-transform">Kirim Laporan</button>
        </div>
    </div>
</div>

<!-- ======== MODAL: Ticket Detail ======== -->
<div id="detailModal" class="fixed inset-0 z-50 hidden">
    <div class="absolute inset-0 bg-slate-900/40" style="-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px)" onclick="APP.closeDetail()"></div>
    <div id="detailContent" class="absolute bottom-0 left-0 right-0 bg-white rounded-t-3xl p-6 shadow-2xl transform translate-y-full transition-transform duration-300 max-h-[85vh] overflow-y-auto">
        <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-6"></div>
        <div id="detailBody"></div>
        <button onclick="APP.closeDetail()" class="w-full mt-4 py-4 bg-slate-100 text-slate-600 font-bold rounded-xl active:scale-95 transition-transform">Tutup</button>
    </div>
</div>

<?!= include('JsHelpdesk'); ?>
</body>
</html>
