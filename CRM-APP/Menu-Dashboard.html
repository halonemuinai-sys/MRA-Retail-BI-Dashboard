<!-- Main Content Area -->
<main class="flex-1 ml-64 p-10 lg:p-14 relative bg-slate-50 min-h-screen pb-32">
    <header class="flex flex-col sm:flex-row sm:justify-between sm:items-end mb-10 pb-6 border-b border-slate-200">
        <div>
            <h1 class="text-3xl lg:text-4xl font-bold text-brand-primary mb-2 tracking-tight">System Global Overview</h1>
            <p class="text-sm font-medium text-slate-500">Monitoring performa pengumpulan data audiens terpadu.</p>
        </div>
        <!-- Bulan & Tahun Filter -->
        <div class="mt-4 sm:mt-0 flex gap-3 bg-white p-2 rounded-2xl shadow-sm border border-slate-200">
            <select id="crmFilterMonth" title="Pilih Bulan" onchange="CRM.loadDashboard()" class="bg-slate-50 border-none px-4 py-2.5 rounded-xl font-bold text-slate-700 text-sm outline-none cursor-pointer hover:bg-slate-100 transition-colors">
                <option value="0">Januari</option><option value="1">Februari</option>
                <option value="2">Maret</option><option value="3">April</option>
                <option value="4">Mei</option><option value="5">Juni</option>
                <option value="6">Juli</option><option value="7">Agustus</option>
                <option value="8">September</option><option value="9">Oktober</option>
                <option value="10">November</option><option value="11">Desember</option>
            </select>
            <select id="crmFilterYear" title="Pilih Tahun" onchange="CRM.loadDashboard()" class="bg-slate-50 border-none px-4 py-2.5 rounded-xl font-bold text-slate-700 text-sm outline-none cursor-pointer hover:bg-slate-100 transition-colors">
                <option value="2026">2026</option>
                <option value="2025">2025</option>
                <option value="2024">2024</option>
            </select>
        </div>
    </header>

    <!-- Loading State -->
    <div id="dashLoader" class="hidden absolute top-32 inset-x-0 bottom-0 bg-slate-50/80 backdrop-blur-[2px] z-50 flex flex-col items-center pt-20">
        <div class="bg-white p-6 rounded-2xl shadow-xl shadow-slate-200 border border-slate-100 flex flex-col items-center">
            <iconify-icon icon="svg-spinners:ring-resize" class="text-4xl text-brand-accent mb-4"></iconify-icon>
            <span class="text-[11px] font-bold text-brand-primary uppercase tracking-widest">Querying Spreadsheets...</span>
        </div>
    </div>

    <!-- Stats Grid (Dynamic Top Cards) -->
    <div id="topKpiContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
        <!-- Default Fallback Card -->
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1.5">Total Traffic</h3>
            <div class="text-4xl font-bold tracking-tight text-brand-primary">...</div>
        </div>
    </div>

    <!-- Main Analytics Layout -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-10">
        
        <!-- Left: Daily Traffic Trend (Area Chart) -->
        <div class="col-span-1 lg:col-span-2 bg-white p-6 lg:p-8 rounded-[2rem] shadow-sm border border-slate-200 relative flex flex-col min-h-[450px]">
            <div class="flex flex-col sm:flex-row justify-between sm:items-center mb-6 gap-4">
                <div>
                    <h3 class="font-bold text-xl text-slate-800">Daily Traffic Trend</h3>
                    <p class="text-[11px] font-medium text-slate-500 mt-1 uppercase tracking-wider">Visit volume analytics over time</p>
                </div>
            </div>
            <div class="w-full relative grow">
                <canvas id="dailyTrafficChart"></canvas>
            </div>
        </div>

        <!-- Right: Sales Intelligence -->
        <div class="col-span-1 bg-white p-6 lg:p-8 rounded-[2rem] shadow-sm border border-slate-200 flex flex-col relative min-h-[450px]">
            <div class="mb-6">
                <h3 class="font-bold text-xl text-slate-800">Sales Intelligence</h3>
                <p class="text-[11px] font-medium text-slate-500 mt-1 uppercase tracking-wider">Conversion & Funnel Metrics</p>
            </div>
            
            <!-- Conversion Donut -->
            <div class="flex justify-center mb-6 relative">
                <div class="w-44 h-44 relative">
                    <canvas id="collectionRateChart"></canvas>
                    <div class="absolute inset-0 flex flex-col justify-center items-center pointer-events-none">
                        <span id="txtDonutRate" class="text-3xl font-bold text-slate-800 tracking-tight">0%</span>
                        <span class="text-[8px] font-bold uppercase tracking-widest text-slate-400 mt-1">Conversion</span>
                    </div>
                </div>
            </div>

            <!-- Prospect Level Analysis -->
            <div class="mt-auto pt-6 border-t border-slate-100">
                <h4 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-4">Prospek Level Analysis</h4>
                <div class="w-full relative h-[140px]">
                    <canvas id="prospectLevelChart"></canvas>
                </div>
            </div>
        </div>
    </div>
</main>
