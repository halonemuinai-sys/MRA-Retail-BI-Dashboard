<script>
    const CRMLive = {
        matrixData: {}, // Traffic
        profilingMatrixData: {}, // Profiling
        availableYears: [],
        currentMatrixYear: new Date().getFullYear(),
        locations: [],

        load: () => {
            const btn = document.getElementById('btnForceExtract');
            if(btn) btn.innerHTML = '<iconify-icon icon="svg-spinners:ring-resize"></iconify-icon> Loading...';

            google.script.run
                .withSuccessHandler(res => {
                    if(btn) btn.innerHTML = '<iconify-icon icon="lucide:refresh-ccw"></iconify-icon> Sync Serverless';
                    
                    if(res.success) {
                        CRMLive.bindData(res);
                        CRM.showToast('Data analitik Lifetime dimuat.');
                    } else {
                        CRM.showToast('Gagal memuat: ' + res.message, true);
                    }
                })
                .withFailureHandler(err => {
                    if(btn) btn.innerHTML = '<iconify-icon icon="lucide:refresh-ccw"></iconify-icon> Sync Serverless';
                    CRM.showToast('Error Server: ' + err.message, true);
                })
                .getLiveTimeDashboardData();
        },

        triggerExtraction: () => {
            const btn = document.getElementById('btnForceExtract');
            if(btn) {
                btn.innerHTML = '<iconify-icon icon="svg-spinners:pulse"></iconify-icon> Fetching Nodes...';
                btn.classList.add('opacity-70', 'cursor-not-allowed');
                btn.disabled = true;
            }

            google.script.run
                .withSuccessHandler(res => {
                    if(btn) {
                        btn.innerHTML = '<iconify-icon icon="lucide:refresh-ccw"></iconify-icon> Sync Serverless';
                        btn.classList.remove('opacity-70', 'cursor-not-allowed');
                        btn.disabled = false;
                    }
                    
                    if(res.success) {
                        CRMLive.bindData(res);
                        CRM.showToast('Memuat matriks real-time dari Supabase Selesai!', false);
                    } else {
                        CRM.showToast('Gagal sinkronisasi: ' + res.message, true);
                    }
                })
                .withFailureHandler(err => {
                    if(btn) {
                        btn.innerHTML = '<iconify-icon icon="lucide:refresh-ccw"></iconify-icon> Sync Serverless';
                        btn.classList.remove('opacity-70', 'cursor-not-allowed');
                        btn.disabled = false;
                    }
                    CRM.showToast('Fatal Error: ' + err.message, true);
                })
                .getLiveTimeDashboardData();
        },

        bindData: (res) => {
            document.getElementById('valLiveTraffic').textContent = res.totalTraffic.toLocaleString('id-ID');
            document.getElementById('valLiveProfiling').textContent = res.totalProfiling.toLocaleString('id-ID');
            document.getElementById('valLiveUpdate').textContent = res.lastUpdate || 'Sekarang';

            let rate = 0;
            if (res.totalTraffic > 0) rate = (res.totalProfiling / res.totalTraffic) * 100;
            
            // Animation for Circular Progress Bar
            const circle = document.getElementById('circleCollectionRate');
            if(circle) {
                const percent = Math.max(0, Math.min(100, rate));
                const offset = 440 - (440 * percent) / 100;
                circle.style.strokeDashoffset = offset;
            }
            document.getElementById('valLiveRate').textContent = rate.toFixed(1) + '%';

            // Store Grid 
            const grid = document.getElementById('liveStoreGrid');
            if(grid) {
                grid.innerHTML = '';
                const locs = res.locations || [];
                if(locs.length === 0) {
                     grid.innerHTML = '<div class="text-sm text-slate-400">Belum ada pemetaan lokasi...</div>';
                }
                locs.forEach(loc => {
                    const cnt = res.storeTraffic[loc] || 0;
                    grid.innerHTML += `
                    <div class="bg-slate-50 border border-slate-100 rounded-2xl p-5 flex items-center justify-between hover:shadow-md transition-shadow">
                        <div class="flex items-center gap-3 truncate">
                            <div class="w-10 h-10 shrink-0 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center">
                                <iconify-icon icon="lucide:map-pin"></iconify-icon>
                            </div>
                            <span class="font-bold text-slate-700 uppercase tracking-widest text-[11px] truncate" title="${loc}">${loc}</span>
                        </div>
                        <span class="text-2xl font-black text-slate-900 ml-4 shrink-0">${cnt.toLocaleString('id-ID')}</span>
                    </div>`;
                });
            }

            // Setup Matrix Data
            CRMLive.matrixData = {};
            CRMLive.availableYears = new Set();
            CRMLive.locations = res.locations || [];
            
            for (const key in res.monthlyMatrix) {
                 const parts = key.split('_');
                 if (parts.length >= 4) {
                     const y = parseInt(parts[1]);
                     const m = parseInt(parts[2]);
                     const loc = parts.slice(3).join('_');
                     
                     CRMLive.availableYears.add(y);
                     
                     if (!CRMLive.matrixData[y]) CRMLive.matrixData[y] = {};
                     if (!CRMLive.matrixData[y][loc]) CRMLive.matrixData[y][loc] = new Array(12).fill(0);
                     
                     CRMLive.matrixData[y][loc][m] = res.monthlyMatrix[key];
                 }
            }
            
            // Setup Profiling Matrix Data
            CRMLive.profilingMatrixData = {};
            for (const key in res.monthlyProfiling) {
                 const parts = key.split('_');
                 if (parts.length >= 4) {
                     const y = parseInt(parts[1]);
                     const m = parseInt(parts[2]);
                     const loc = parts.slice(3).join('_');
                     
                     CRMLive.availableYears.add(y);
                     
                     if (!CRMLive.profilingMatrixData[y]) CRMLive.profilingMatrixData[y] = {};
                     if (!CRMLive.profilingMatrixData[y][loc]) CRMLive.profilingMatrixData[y][loc] = new Array(12).fill(0);
                     
                     CRMLive.profilingMatrixData[y][loc][m] = res.monthlyProfiling[key];
                 }
            }
            
            let yearsArr = Array.from(CRMLive.availableYears).sort((a,b) => b - a);
            if(yearsArr.length === 0) yearsArr = [new Date().getFullYear()]; // fallback
            
            CRMLive.availableYears = yearsArr;
            if(!CRMLive.availableYears.includes(CRMLive.currentMatrixYear)) {
                CRMLive.currentMatrixYear = CRMLive.availableYears[0];
            }

            CRMLive.renderMatrixToggle();
            CRMLive.renderMatrixTable(CRMLive.currentMatrixYear);
        },

        renderMatrixToggle: () => {
            const container = document.getElementById('liveYearToggles');
            if(!container) return;
            
            let html = '';
            CRMLive.availableYears.forEach(y => {
                const isActive = (y === CRMLive.currentMatrixYear);
                const btnClass = isActive 
                    ? 'bg-brand-primary text-white shadow-md cursor-default'
                    : 'bg-slate-100 text-slate-600 hover:bg-slate-200 cursor-pointer';
                    
                html += `<button onclick="CRMLive.switchMatrixYear(${y})" class="px-5 py-2 rounded-full text-sm font-bold transition-all border border-transparent ${isActive ? 'ring-2 ring-brand-primary/20' : ''} ${btnClass}">${y}</button>`;
            });
            container.innerHTML = html;
        },

        switchMatrixYear: (y) => {
            if(y === CRMLive.currentMatrixYear) return;
            CRMLive.currentMatrixYear = y;
            CRMLive.renderMatrixToggle();
            CRMLive.renderMatrixTable(y);
        },

        renderMatrixTable: (year) => {
            const tbodyTraffic = document.getElementById('liveMatrixBody');
            const tbodyProf = document.getElementById('livePMatrixBody');
            if(!tbodyTraffic || !tbodyProf) return;
            
            if(CRMLive.locations.length === 0) {
                 tbodyTraffic.innerHTML = '<tr><td colspan="14" class="py-8 text-center text-rose-400 font-bold">Tidak ada data untuk dirender. Coba jalankan Force Extract.</td></tr>';
                 tbodyProf.innerHTML = '<tr><td colspan="14" class="py-8 text-center text-rose-400 font-bold">Tidak ada data untuk dirender. Coba jalankan Force Extract.</td></tr>';
                 return;
            }
            
            // Render Traffic
            const yearDataT = CRMLive.matrixData[year] || {};
            let htmlT = '';
            CRMLive.locations.forEach(loc => {
                const monthlyCounts = yearDataT[loc] || new Array(12).fill(0);
                const totalYtd = monthlyCounts.reduce((a, b) => a + b, 0);
                
                htmlT += `<tr class="hover:bg-slate-50/80 transition-colors group">`;
                htmlT += `<td class="py-4 px-6 whitespace-nowrap text-[11px] font-bold text-slate-700 uppercase tracking-widest sticky left-0 bg-white group-hover:bg-slate-50 z-10 shadow-[1px_0_0_#e2e8f0]">${loc}</td>`;
                
                monthlyCounts.forEach(val => {
                    const txtClass = val > 0 ? 'text-slate-800 font-bold' : 'text-slate-300';
                    htmlT += `<td class="py-4 px-3 whitespace-nowrap text-xs text-center ${txtClass}">${val === 0 ? '-' : val.toLocaleString('id-ID')}</td>`;
                });
                
                htmlT += `<td class="py-4 px-6 whitespace-nowrap text-sm font-black text-brand-primary text-right bg-blue-50/30">${totalYtd.toLocaleString('id-ID')}</td>`;
                htmlT += `</tr>`;
            });
            tbodyTraffic.innerHTML = htmlT;
            
            // Render Profiling
            const yearDataP = CRMLive.profilingMatrixData[year] || {};
            let htmlP = '';
            CRMLive.locations.forEach(loc => {
                const monthlyCounts = yearDataP[loc] || new Array(12).fill(0);
                const totalYtd = monthlyCounts.reduce((a, b) => a + b, 0);
                
                htmlP += `<tr class="hover:bg-slate-50/80 transition-colors group">`;
                htmlP += `<td class="py-4 px-6 whitespace-nowrap text-[11px] font-bold text-slate-700 uppercase tracking-widest sticky left-0 bg-white group-hover:bg-slate-50 z-10 shadow-[1px_0_0_#e2e8f0]">${loc}</td>`;
                
                monthlyCounts.forEach(val => {
                    const txtClass = val > 0 ? 'text-brand-primary font-bold' : 'text-slate-300';
                    htmlP += `<td class="py-4 px-3 whitespace-nowrap text-xs text-center ${txtClass}">${val === 0 ? '-' : val.toLocaleString('id-ID')}</td>`;
                });
                
                htmlP += `<td class="py-4 px-6 whitespace-nowrap text-sm font-black text-slate-800 text-right bg-brand-primary/10">${totalYtd.toLocaleString('id-ID')}</td>`;
                htmlP += `</tr>`;
            });
            tbodyProf.innerHTML = htmlP;
        }
    };
</script>
