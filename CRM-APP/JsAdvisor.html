<script>
    const CRMAdv = {
        months: ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'],
        
        init: () => {
            const mSel = document.getElementById('advFilterMonth');
            const ySel = document.getElementById('advFilterYear');
            if(!mSel || !ySel) return;
            
            const now = new Date();
            let mHtml = '';
            CRMAdv.months.forEach((m, i) => mHtml += `<option value="${i}" ${i === now.getMonth()?'selected':''}>${m}</option>`);
            mSel.innerHTML = mHtml;
            
            let yHtml = '';
            const cy = now.getFullYear();
            for(let y = cy + 1; y >= cy - 2; y--) yHtml += `<option value="${y}" ${y === cy?'selected':''}>${y}</option>`;
            ySel.innerHTML = yHtml;
        },

        fetchData: () => {
            const mSel = document.getElementById('advFilterMonth');
            if(!mSel) return; // not loaded yet
            
            const m = mSel.value;
            const y = document.getElementById('advFilterYear').value;
            const btnIcon = document.getElementById('advRefreshIcon');
            const tbody = document.getElementById('advTableBody');
            
            btnIcon.classList.add('animate-spin');
            tbody.innerHTML = '<tr><td colspan="10" class="py-16 text-center text-slate-400 bg-slate-50/50"><iconify-icon icon="svg-spinners:pulse" class="text-4xl mb-3 text-brand-primary"></iconify-icon><p class="text-[10px] font-bold uppercase tracking-widest text-slate-500 mb-1">Kalkulasi 10,000+ Baris Data...</p><p class="text-xs text-slate-400">Menyusun matriks performa bulanan dan persentase sukses.</p></td></tr>';
            
            google.script.run
                .withSuccessHandler(res => {
                    btnIcon.classList.remove('animate-spin');
                    if (res.success) {
                        CRMAdv.renderTable(res.data, res.summary);
                    } else {
                        CRM.showError('Gagal memuat data performa: ' + res.message);
                        tbody.innerHTML = `<tr><td colspan="10" class="py-12 text-center font-bold text-rose-500 bg-red-50/30">${res.message}</td></tr>`;
                    }
                })
                .withFailureHandler(err => {
                    btnIcon.classList.remove('animate-spin');
                    CRM.showError(err.message);
                    tbody.innerHTML = `<tr><td colspan="10" class="py-12 text-center font-bold text-rose-500 bg-red-50/30">${err.message}</td></tr>`;
                })
                .getTopAdvisorPerformance(m, y);
        },

        renderTable: (data, summary) => {
            const tbody = document.getElementById('advTableBody');
            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="10" class="py-16 text-center text-slate-500 bg-slate-50/50 font-bold uppercase tracking-widest text-xs">Tidak ada data traffic atau form profiling untuk bulan tersebut.</td></tr>';
                return;
            }

            let html = '';
            data.forEach((adv, index) => {
                 let medal = '';
                 if (index === 0) medal = '<iconify-icon icon="twemoji:1st-place-medal" class="text-xl mr-3 drop-shadow-sm"></iconify-icon>';
                 else if (index === 1) medal = '<iconify-icon icon="twemoji:2nd-place-medal" class="text-lg mr-3 drop-shadow-sm"></iconify-icon>';
                 else if (index === 2) medal = '<iconify-icon icon="twemoji:3rd-place-medal" class="text-lg mr-3 drop-shadow-sm"></iconify-icon>';
                 else medal = `<span class="text-[10px] font-bold text-slate-400 bg-slate-100 rounded-full w-6 h-6 flex items-center justify-center mr-3">#${index+1}</span>`;

                 const contribNum = parseFloat(adv.contrib);
                 const srNum = parseFloat(adv.successRate);

                 html += `<tr class="hover:bg-slate-50/80 transition-colors group">
                    <td class="py-4 px-6 whitespace-nowrap sticky left-0 bg-white group-hover:bg-slate-50 z-10 shadow-[1px_0_0_#e2e8f0]">
                        <div class="flex items-center">
                            ${medal}
                            <div>
                                <p class="text-sm font-bold text-slate-800">${adv.name}</p>
                            </div>
                        </div>
                    </td>
                    <td class="py-4 px-4 whitespace-nowrap text-center bg-blue-50/30">
                        <span class="text-lg font-black text-brand-primary">${adv.traffic}</span>
                    </td>
                    <td class="py-4 px-4 whitespace-nowrap text-center bg-purple-50/30">
                        <span class="text-lg font-black text-purple-600">${adv.profiling}</span>
                    </td>
                    <td class="py-4 px-4 whitespace-nowrap text-center bg-amber-50/30">
                        <span class="text-sm font-bold ${contribNum > 10 ? 'text-amber-600' : 'text-slate-500'}">${contribNum.toFixed(1)}%</span>
                        <div class="w-full bg-slate-200 h-1.5 rounded-full mt-1.5 overflow-hidden"><div class="bg-amber-500 h-full rounded-full" style="width: ${Math.min(contribNum, 100)}%"></div></div>
                    </td>
                    <td class="py-4 px-4 whitespace-nowrap text-center bg-emerald-50/30">
                        <span class="text-[15px] font-bold text-emerald-600">${adv.levelBerhasil}</span>
                        <span class="block text-[10px] text-emerald-600/70 font-semibold mt-0.5">${srNum.toFixed(1)}% SR</span>
                    </td>
                    <td class="py-4 px-4 whitespace-nowrap text-center bg-red-50/10">
                        <span class="text-xs font-bold text-rose-500">${adv.levelGagal}</span>
                    </td>
                    
                    <td class="py-4 px-4 whitespace-nowrap text-center border-l border-slate-100 text-xs font-bold ${adv.walkIn > 0 ? 'text-slate-700' : 'text-slate-300'}">${adv.walkIn}</td>
                    <td class="py-4 px-4 whitespace-nowrap text-center text-xs font-bold ${adv.followUp > 0 ? 'text-slate-700' : 'text-slate-300'}">${adv.followUp}</td>
                    <td class="py-4 px-4 whitespace-nowrap text-center border-r border-slate-100 text-xs font-bold ${adv.online > 0 ? 'text-slate-700' : 'text-slate-300'}">${adv.online}</td>
                    <td class="py-4 px-4 whitespace-nowrap text-center text-xs font-bold ${adv.deliveryShowing > 0 ? 'text-slate-700' : 'text-slate-300'}">${adv.deliveryShowing}</td>
                 </tr>`;
            });
            
            // Grand Total Row
            html += `<tr class="bg-slate-100 border-t-2 border-slate-200">
                <td class="py-5 px-6 whitespace-nowrap font-black text-slate-800 uppercase tracking-widest sticky left-0 bg-slate-100 z-10 shadow-[1px_0_0_#e2e8f0]">GRAND TOTAL STORE</td>
                <td class="py-5 px-4 whitespace-nowrap text-center text-xl font-black text-brand-primary">${summary.totalTraffic}</td>
                <td class="py-5 px-4 whitespace-nowrap text-center text-xl font-black text-purple-600">${summary.totalProfiling}</td>
                <td class="py-5 px-4 whitespace-nowrap text-center text-sm font-black text-slate-500">100%</td>
                <td class="py-5 px-4 whitespace-nowrap text-center text-sm font-black text-emerald-600">${summary.totalBerhasil}</td>
                <td class="py-5 px-4 whitespace-nowrap text-center text-sm font-black text-rose-500">${summary.totalGagal}</td>
                <td colspan="4" class="py-5 px-4 text-center text-[10px] text-slate-400 font-bold uppercase tracking-widest border-l border-slate-200">Total Akumulasi</td>
            </tr>`;
            
            tbody.innerHTML = html;
        }
    };
    
    // CRM initialization hook
    document.addEventListener('DOMContentLoaded', CRMAdv.init);
</script>
