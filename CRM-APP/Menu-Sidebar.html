<!-- Menu-Sidebar.html -->
<style>
    .navbtn.is-active { background-color: rgba(30, 41, 59, 0.8); color: white; border-color: rgba(51, 65, 85, 0.5); border-radius: 1rem; box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.05); }
    .navbtn.is-active .icon-box { background-color: rgba(59, 130, 246, 0.2); box-shadow: 0 0 12px rgba(59, 130, 246, 0.3); }
    .navbtn.is-active iconify-icon { color: #60a5fa; }
</style>
<aside class="w-64 bg-slate-900 border-r border-slate-800 text-slate-300 flex flex-col fixed inset-y-0 left-0 z-20 shadow-[4px_0_24px_rgba(0,0,0,0.5)]">
    <!-- Header with Gradient Logo and Glow -->
    <div class="p-8 border-b border-slate-800/80 relative overflow-hidden flex flex-col items-center justify-center">
        <!-- Glow logic -->
        <div class="absolute -top-10 -left-10 w-32 h-32 bg-blue-500/10 rounded-full blur-3xl pointer-events-none"></div>
        <div class="absolute bottom-0 right-0 w-32 h-32 bg-purple-500/10 rounded-full blur-3xl pointer-events-none"></div>

        <h2 class="text-4xl font-display font-black tracking-widest text-transparent bg-clip-text bg-gradient-to-br from-blue-400 via-indigo-400 to-purple-400 drop-shadow-md relative z-10 transition-transform hover:scale-105 duration-500 cursor-default">ARES</h2>
        <span class="inline-block mt-2 text-[9px] uppercase tracking-[0.3em] text-slate-400 font-bold relative z-10 bg-slate-800/50 px-3 py-1 rounded-full border border-slate-700/50">CRM Master Center</span>
    </div>

    <!-- Navigation Menu -->
    <nav class="flex-1 overflow-y-auto px-4 py-6 flex flex-col gap-2 scrollbar-none">
        
        <div class="px-2 mb-1">
            <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Main Modules</p>
        </div>

        <button id="navbtn-dashboard" onclick="CRM.switchTab('dashboard')" class="navbtn w-full flex items-center gap-3 px-4 py-3.5 rounded-2xl text-sm font-semibold text-slate-400 hover:text-white hover:bg-slate-800/50 active:scale-95 transition-all duration-300 group border border-transparent">
            <div class="icon-box w-8 h-8 rounded-xl bg-slate-800/80 flex items-center justify-center group-hover:bg-blue-500/20 group-hover:shadow-[0_0_12px_rgba(59,130,246,0.4)] transition-all">
                <iconify-icon icon="lucide:layout-dashboard" class="text-lg text-slate-400 group-hover:text-blue-400 transition-colors"></iconify-icon>
            </div>
            <span class="group-hover:translate-x-1 transition-transform">Master Dashboard</span>
        </button>

        <button id="navbtn-livetime" onclick="CRM.switchTab('livetime')" class="navbtn w-full flex items-center gap-3 px-4 py-3.5 rounded-2xl text-sm font-semibold text-slate-400 hover:text-white hover:bg-slate-800/50 active:scale-95 transition-all duration-300 group border border-transparent mt-1">
            <div class="icon-box w-8 h-8 rounded-xl bg-slate-800/80 flex items-center justify-center group-hover:bg-indigo-500/20 group-hover:shadow-[0_0_12px_rgba(99,102,241,0.4)] transition-all">
                <iconify-icon icon="lucide:activity" class="text-lg text-slate-400 group-hover:text-indigo-400 transition-colors"></iconify-icon>
            </div>
            <span class="group-hover:translate-x-1 transition-transform">Live Time</span>
        </button>

        <button id="navbtn-advisor" onclick="CRM.switchTab('advisor')" class="navbtn w-full flex items-center gap-3 px-4 py-3.5 rounded-2xl text-sm font-semibold text-slate-400 hover:text-white hover:bg-slate-800/50 active:scale-95 transition-all duration-300 group border border-transparent mt-1">
            <div class="icon-box w-8 h-8 rounded-xl bg-slate-800/80 flex items-center justify-center group-hover:bg-amber-500/20 group-hover:shadow-[0_0_12px_rgba(245,158,11,0.4)] transition-all">
                <iconify-icon icon="lucide:award" class="text-lg text-slate-400 group-hover:text-amber-400 transition-colors"></iconify-icon>
            </div>
            <span class="group-hover:translate-x-1 transition-transform">Top Advisor</span>
        </button>

        <div class="px-2 mt-5 mb-1">
            <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Operations</p>
        </div>

        <button id="navbtn-profiling" onclick="CRM.switchTab('profiling')" class="hidden navbtn w-full flex items-center gap-3 px-4 py-3.5 rounded-2xl text-sm font-semibold text-slate-400 hover:text-white hover:bg-slate-800/50 active:scale-95 transition-all duration-300 group border border-transparent mt-1">
            <div class="icon-box w-8 h-8 rounded-xl bg-slate-800/80 flex items-center justify-center group-hover:bg-purple-500/20 group-hover:shadow-[0_0_12px_rgba(168,85,247,0.4)] transition-all">
                <iconify-icon icon="lucide:database" class="text-lg text-slate-400 group-hover:text-purple-400 transition-colors"></iconify-icon>
            </div>
            <span class="group-hover:translate-x-1 transition-transform">Extract Profiling</span>
        </button>

        <!-- Customer Master -->
        <button id="navbtn-customer" onclick="CRM.switchTab('customer')" class="navbtn w-full flex items-center gap-3 px-4 py-3.5 rounded-2xl text-sm font-semibold text-slate-400 hover:text-white hover:bg-slate-800/50 active:scale-95 transition-all duration-300 group border border-transparent mt-1 relative">
            <div class="icon-box w-8 h-8 rounded-xl bg-slate-800/80 flex items-center justify-center group-hover:bg-rose-500/20 group-hover:shadow-[0_0_12px_rgba(244,63,94,0.4)] transition-all relative">
                <iconify-icon icon="lucide:contact-2" class="text-lg text-slate-400 group-hover:text-rose-400 transition-colors"></iconify-icon>
            </div>
            <span class="group-hover:translate-x-1 transition-transform">Customer Master</span>
        </button>

        <button id="navbtn-traffic" onclick="CRM.switchTab('traffic')" class="hidden navbtn w-full flex items-center gap-3 px-4 py-3.5 rounded-2xl text-sm font-semibold text-slate-400 hover:text-white hover:bg-slate-800/50 active:scale-95 transition-all duration-300 group border border-transparent mt-1">
            <div class="icon-box w-8 h-8 rounded-xl bg-slate-800/80 flex items-center justify-center group-hover:bg-cyan-500/20 group-hover:shadow-[0_0_12px_rgba(6,182,212,0.4)] transition-all">
                <iconify-icon icon="lucide:arrow-right-left" class="text-lg text-slate-400 group-hover:text-cyan-400 transition-colors"></iconify-icon>
            </div>
            <span class="group-hover:translate-x-1 transition-transform">Traffic Sync</span>
        </button>

        <button id="navbtn-clean" onclick="CRM.switchTab('clean')" class="navbtn w-full flex items-center gap-3 px-4 py-3.5 rounded-2xl text-sm font-semibold text-slate-400 hover:text-white hover:bg-slate-800/50 active:scale-95 transition-all duration-300 group border border-transparent mt-1">
            <div class="icon-box w-8 h-8 rounded-xl bg-slate-800/80 flex items-center justify-center group-hover:bg-emerald-500/20 group-hover:shadow-[0_0_12px_rgba(16,185,129,0.4)] transition-all">
                <iconify-icon icon="lucide:shield-check" class="text-lg text-slate-400 group-hover:text-emerald-400 transition-colors"></iconify-icon>
            </div>
            <span class="group-hover:translate-x-1 transition-transform">Clean System</span>
        </button>

        <button id="navbtn-birthday" onclick="CRM.switchTab('birthday')" class="navbtn w-full flex items-center gap-3 px-4 py-3.5 rounded-2xl text-sm font-semibold text-slate-400 hover:text-white hover:bg-slate-800/50 active:scale-95 transition-all duration-300 group border border-transparent mt-1 relative">
            <div class="icon-box w-8 h-8 rounded-xl bg-slate-800/80 flex items-center justify-center group-hover:bg-rose-500/20 group-hover:shadow-[0_0_12px_rgba(244,63,94,0.4)] transition-all relative">
                <iconify-icon icon="lucide:gift" class="text-lg text-slate-400 group-hover:text-rose-400 transition-colors"></iconify-icon>
                <span class="absolute -top-1 -right-1 w-2.5 h-2.5 rounded-full bg-rose-500 shadow-[0_0_8px_rgba(244,63,94,0.8)] animate-pulse border border-slate-900"></span>
            </div>

        </button>

    <!-- User Profile Footer -->
    <div class="p-5 border-t border-slate-800/80 bg-slate-950/80 relative overflow-hidden group">
        <!-- Hover Glow -->
        <div class="absolute inset-0 bg-gradient-to-r from-transparent via-blue-500/5 to-transparent -translate-x-full group-hover:animate-[shimmer_2s_infinite]"></div>
        
        <div class="flex items-center gap-3 mb-4 relative z-10">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-500 to-indigo-600 shadow-[0_0_15px_rgba(59,130,246,0.3)] flex items-center justify-center text-white font-black text-lg ring-1 ring-slate-800" id="userAvatar">A</div>
            <div class="overflow-hidden flex-1">
                <div class="text-[13px] font-bold text-white leading-tight mb-0.5 truncate" id="userNameLabel">CRM User</div>
                <div class="text-[9px] uppercase tracking-widest text-indigo-300 font-semibold truncate" id="userRoleLabel">Admin</div>
            </div>
        </div>
        
        <button onclick="CRM.logout()" class="w-full flex items-center justify-center gap-2 text-[10px] font-bold text-slate-400 bg-slate-900 border border-slate-800 hover:border-red-500/50 hover:bg-red-500/10 hover:text-red-400 hover:shadow-[0_0_12px_rgba(239,68,68,0.2)] active:scale-95 py-3 rounded-xl transition-all uppercase tracking-widest relative z-10">
            <iconify-icon icon="lucide:power" class="text-sm"></iconify-icon> Secure Logout
        </button>
    </div>
</aside>
