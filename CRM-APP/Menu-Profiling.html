<!-- Main Content Area: PROFILING -->
<main class="flex-1 ml-64 p-8 lg:p-12 relative bg-slate-50 min-h-screen flex flex-col h-screen">
    <header class="flex flex-col sm:flex-row sm:justify-between sm:items-end mb-8 pb-4 border-b border-slate-200 shrink-0">
        <div>
            <h1 class="text-3xl lg:text-4xl font-bold text-brand-primary mb-2 tracking-tight">Extract Profiling</h1>
            <p class="text-sm font-medium text-slate-500">Live dynamic feed from Form Profiling sheet</p>
        </div>
        <div class="mt-4 sm:mt-0 flex items-center gap-3">
            <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                    <iconify-icon icon="lucide:search"></iconify-icon>
                </div>
                <input type="text" id="inpSearchProfiling" onkeyup="CRM.searchProfiling()" class="w-64 pl-9 pr-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-purple-400/50 focus:border-purple-400 bg-white transition-all text-xs font-semibold text-slate-800 placeholder:text-slate-400" placeholder="Search any column...">
            </div>
            <button onclick="CRM.loadProfiling()" class="flex items-center gap-2 px-5 py-2.5 bg-white border border-slate-200 shadow-sm rounded-xl text-[11px] font-bold uppercase tracking-widest text-purple-600 hover:bg-purple-50 hover:border-purple-200 active:scale-95 transition-all" title="Refresh Tabel">
                <iconify-icon icon="lucide:refresh-cw"></iconify-icon> Refresh
            </button>
            <button onclick="CRM.pushProfilingToSupabase()" class="flex items-center gap-2 px-5 py-2.5 bg-emerald-600 border border-emerald-700 shadow-md rounded-xl text-[11px] font-bold uppercase tracking-widest text-white hover:bg-emerald-700 active:scale-95 transition-all" title="Cerminkan data Profiling ini ke Supabase">
                <iconify-icon icon="lucide:server"></iconify-icon> Push to Supabase
            </button>
        </div>
    </header>

    <!-- Table Container -->
    <div class="flex-1 bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden flex flex-col relative">
        
        <!-- Loading Overlay for Table -->
        <div id="profilingLoader" class="absolute inset-0 bg-white/80 backdrop-blur-[1px] z-10 hidden flex-col items-center justify-center">
            <iconify-icon icon="svg-spinners:ring-resize" class="text-4xl text-brand-accent mb-4"></iconify-icon>
            <span class="text-[11px] font-bold text-slate-500 uppercase tracking-widest">Applying Matrix...</span>
        </div>

        <div class="overflow-x-auto flex-1 h-full max-w-[calc(100vw-22rem)]">
            <table class="w-full text-left border-collapse table-auto whitespace-nowrap" id="tblProfiling">
                <thead class="sticky top-0 bg-slate-50 border-b border-slate-200 z-0">
                    <tr id="trProfilingHead">
                        <th class="py-4 px-6 text-[10px] font-bold text-slate-400 uppercase tracking-widest">Pillars</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-100 text-sm font-medium text-slate-700" id="tbProfilingBody">
                    <tr>
                        <td class="py-12 text-center text-slate-400 text-sm">
                            <iconify-icon icon="lucide:database" class="text-3xl mb-2 opacity-50 block mx-auto"></iconify-icon>
                            No data loaded. Click Sync to fetch from Google Sheets.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        
        <div class="bg-slate-50 border-t border-slate-200 py-3 px-6 text-xs font-bold text-slate-500 flex justify-between items-center shrink-0">
            <span>Showing <span id="valProfilingCount" class="text-brand-primary">0</span> entries across <span id="valProfilingCols" class="text-brand-primary">0</span> columns</span>
            <span class="text-[10px] uppercase tracking-widest opacity-60">Sorted by Newest</span>
        </div>
    </div>
</main>
