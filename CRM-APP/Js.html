<script>
    const CRM = {
        currentUser: null,
        dailyChartInstance: null,
        donutChartInstance: null,
        prospectChartInstance: null,
        trafficDataCache: [], // Store raw rows for searching
        profilingDataCache: { headers: [], rows: [] },

        showToast: (msg, isError = false) => {
            const wrapper = document.getElementById('toastContainer');
            const el = document.createElement('div');
            el.className = `toast-anim-in flex items-center gap-3 px-4 py-3 rounded-lg shadow-lg border text-sm font-medium ${isError ? 'bg-red-50 text-red-800 border-red-200' : 'bg-brand-primary text-white border-slate-700'}`;
            el.innerHTML = isError 
                ? '<iconify-icon icon="lucide:alert-circle" class="text-lg"></iconify-icon>' + msg 
                : '<iconify-icon icon="lucide:check-circle-2" class="text-brand-accent text-lg"></iconify-icon>' + msg;
            
            wrapper.appendChild(el);
            setTimeout(() => {
                el.classList.replace('toast-anim-in', 'toast-anim-out');
                setTimeout(() => el.remove(), 300);
            }, 3000);
        },

        navigate: (viewId) => {
            document.querySelectorAll('.view-module').forEach(v => {
                v.classList.add('hidden');
                v.classList.remove('opacity-100');
            });
            const target = document.getElementById('view-' + viewId);
            if(target) {
                target.classList.remove('hidden');
                void target.offsetWidth;
                target.classList.add('opacity-100');
            }
        },

        switchTab: (tabId) => {
            // Hide all subviews
            document.querySelectorAll('.subview').forEach(s => s.classList.add('hidden'));
            // Remove active style from nav buttons
            document.querySelectorAll('.navbtn').forEach(btn => {
                btn.classList.remove('is-active', 'bg-slate-800/80', 'text-white', 'shadow-inner');
                btn.classList.add('hover:bg-slate-800/50', 'text-slate-400');
            });
            
            // Show target subview
            const tgt = document.getElementById('subview-' + tabId);
            if(tgt) tgt.classList.remove('hidden');

            // Style active nav button
            const btn = document.getElementById('navbtn-' + tabId);
            if(btn) {
                btn.classList.add('is-active');
                btn.classList.remove('hover:bg-slate-800/50', 'text-slate-400');
            }

            // Auto-load logic when entering a tab
            if (tabId === 'traffic' && CRM.trafficDataCache.length === 0) {
                CRM.loadTraffic();
            } else if (tabId === 'profiling' && CRM.profilingDataCache.rows.length === 0) {
                CRM.loadProfiling();
            } else if (tabId === 'customer' && (!CUSTOMER.rawData || CUSTOMER.rawData.length === 0)) {
                CUSTOMER.init();
            } else if (tabId === 'birthday' && window.CRMBirthday && CRMBirthday.dataCache.length === 0) {
                CRMBirthday.load();
            } else if (tabId === 'livetime' && window.CRMLive) {
                const val = document.getElementById('valLiveTraffic');
                if (val && val.textContent === '0') {
                    CRMLive.load();
                }
            } else if (tabId === 'advisor' && window.CRMAdv && !CRMAdv.hasLoaded) {
                CRMAdv.hasLoaded = true;
                CRMAdv.fetchData();
            }
        },

        login: () => {
            const u = document.getElementById('inpUsername').value.trim();
            const p = document.getElementById('inpPassword').value.trim();
            if(!u || !p) {
                CRM.showToast('Harap isi semua kolom', true);
                return;
            }

            const btn = document.getElementById('btnLogin');
            btn.innerHTML = '<iconify-icon icon="svg-spinners:ring-resize"></iconify-icon> Verifying...';
            btn.disabled = true;

            google.script.run
                .withSuccessHandler(res => {
                    btn.innerHTML = '<iconify-icon icon="lucide:log-in"></iconify-icon> Sign In';
                    btn.disabled = false;

                    if (res.success) {
                        CRM.currentUser = res.user;
                        localStorage.setItem('crmUser', JSON.stringify(res.user));
                        
                        document.getElementById('userNameLabel').textContent = res.user.name;
                        document.getElementById('userRoleLabel').textContent = res.user.role;
                        document.getElementById('userAvatar').textContent = res.user.name.charAt(0).toUpperCase();

                        CRM.navigate('app-shell');
                        CRM.switchTab('dashboard');
                        CRM.loadDashboard();
                        CRM.showToast('Selamat datang, ' + res.user.name);
                    } else {
                        CRM.showToast(res.message, true);
                    }
                })
                .withFailureHandler(err => {
                    btn.innerHTML = '<iconify-icon icon="lucide:log-in"></iconify-icon> Sign In';
                    btn.disabled = false;
                    CRM.showToast('Server Timeout: ' + err.message, true);
                })
                .doCrmLogin(u, p);
        },

        logout: () => {
            CRM.currentUser = null;
            localStorage.removeItem('crmUser');
            document.getElementById('inpPassword').value = '';
            CRM.navigate('login');
            CRM.showToast('Berhasil Logout');
        },

        loadDashboard: () => {
             const mSel = document.getElementById('crmFilterMonth');
             const ySel = document.getElementById('crmFilterYear');
             const selectedM = mSel ? parseInt(mSel.value) : new Date().getMonth();
             const selectedY = ySel ? parseInt(ySel.value) : new Date().getFullYear();

            document.getElementById('dashLoader').classList.remove('hidden');
            
            google.script.run
                .withSuccessHandler(res => {
                    document.getElementById('dashLoader').classList.add('hidden');
                    if (res.success) {
                        const d = res.data;
                        
                        document.getElementById('dashTotalProfiling').textContent = d.totalProfiling.toLocaleString('id-ID');
                        document.getElementById('dashTotalTraffic').textContent = d.totalTraffic.toLocaleString('id-ID');
                        
                        CRM.renderTopKpis(d.storeTraffic, d.locations);
                        
                        let rate = 0;
                        if (d.totalTraffic > 0) rate = (d.totalProfiling / d.totalTraffic) * 100;
                        document.getElementById('dashCollectionRate').textContent = rate.toFixed(1) + '%';
                        document.getElementById('txtDonutRate').textContent = rate.toFixed(1) + '%';
                        
                        const daysInMonth = new Date(selectedY, selectedM + 1, 0).getDate();
                        CRM.renderDailyChart(d.dailyChartData, d.locations, daysInMonth);
                        CRM.renderDonutChart(rate);
                        CRM.renderProspectChart(d.prospectData);
                        
                    } else {
                        CRM.showToast(res.message, true);
                    }
                })
                .withFailureHandler(err => {
                    document.getElementById('dashLoader').classList.add('hidden');
                    CRM.showToast('Kesalahan ambil data: ' + err.message, true);
                })
                .getCrmDashboardOverview(selectedM, selectedY);
        },
        
        renderTopKpis: (storeTraffic, locations) => {
            const container = document.getElementById('storeKpiContainer');
            if(!container) return;

            // Sort locations to render them consistently
            const sortedLocs = locations.filter(x => x && x !== '-').sort();
            let html = '';

            
            sortedLocs.forEach((loc, idx) => {
                const count = storeTraffic[loc] || 0;
                
                // Variasikan icon atau warna biar lebih mirip screenshot user
                const icons = ['lucide:store', 'lucide:building-2', 'lucide:plane', 'lucide:map-pin'];
                const icn = icons[idx % icons.length];
                const badgeCols = ['bg-slate-100 text-slate-500', 'bg-emerald-50 text-emerald-600', 'bg-rose-50 text-rose-500', 'bg-blue-50 text-brand-primary'];
                const bCol = badgeCols[idx % badgeCols.length];
                
                html += `
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 relative overflow-hidden group">
                    <div class="absolute right-0 top-0 w-20 h-20 bg-slate-50 rounded-bl-[100px] -z-0"></div>
                    <div class="absolute right-4 top-4 ${bCol} w-8 h-8 flex items-center justify-center rounded-full group-hover:scale-110 transition-transform">
                        <iconify-icon icon="${icn}" class="text-sm"></iconify-icon>
                    </div>
                    <h3 class="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-2 relative z-10 truncate pr-6">${loc}</h3>
                    <div class="flex items-baseline gap-2 relative z-10">
                        <span class="text-4xl font-display font-bold tracking-tight text-slate-800">${count.toLocaleString('id-ID')}</span>
                    </div>
                </div>
                `;
            });

            container.innerHTML = html;
        },

        renderDailyChart: (dailyChartData, locations, daysInMonth) => {
            const ctx = document.getElementById('dailyTrafficChart');
            if (!ctx) return;
            if (CRM.dailyChartInstance) CRM.dailyChartInstance.destroy();

            const labels = [];
            for(let i=1; i<=daysInMonth; i++) labels.push(i);

            const c2d = ctx.getContext('2d');
            
            const createGrad = (hexRGB) => {
                const grad = c2d.createLinearGradient(0, 0, 0, 350);
                grad.addColorStop(0, `rgba(${hexRGB}, 0.5)`);
                grad.addColorStop(1, `rgba(${hexRGB}, 0.0)`);
                return grad;
            };

            const colorPalette = [
                { border: '#38bdf8', bg: createGrad('56, 189, 248') },
                { border: '#a78bfa', bg: createGrad('167, 139, 250') },
                { border: '#34d399', bg: createGrad('52, 211, 153') },
                { border: '#fbbf24', bg: createGrad('251, 191, 36') },
                { border: '#fb7185', bg: createGrad('251, 113, 133') },
                { border: '#818cf8', bg: createGrad('129, 140, 248') }
            ];

            const sortedLocs = locations.filter(x => x && x !== '-').sort();

            const datasets = sortedLocs.map((loc, idx) => {
                const dataArr = [];
                for (let i = 0; i < daysInMonth; i++) {
                    dataArr.push(dailyChartData[i][loc] || 0);
                }
                const p = colorPalette[idx % colorPalette.length];
                return {
                    label: loc,
                    data: dataArr,
                    borderColor: p.border,
                    backgroundColor: p.bg,
                    borderWidth: 2.5,
                    tension: 0.45,
                    fill: true,
                    pointBackgroundColor: p.border,
                    pointBorderColor: '#0f172a',
                    pointBorderWidth: 2,
                    pointRadius: 0,
                    pointHoverRadius: 6,
                    pointHoverBackgroundColor: p.border,
                    pointHoverBorderColor: '#ffffff',
                    pointHoverBorderWidth: 2
                };
            });

            CRM.dailyChartInstance = new Chart(c2d, {
                type: 'line',
                data: { labels: labels, datasets: datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    scales: {
                        x: { 
                            grid: { display: false, drawBorder: false }, 
                            ticks: { font: { family: "'Inter', sans-serif", size: 11 }, color: '#64748b' } 
                        },
                        y: { 
                            beginAtZero: true, 
                            border: { display: false, dash: [4,4] }, 
                            grid: { color: 'rgba(255, 255, 255, 0.05)', drawBorder: false, tickLength: 0 }, 
                            ticks: { 
                                font: { family: "'Inter', sans-serif", size: 11, weight: '500' }, 
                                color: '#64748b', 
                                padding: 15
                            } 
                        }
                    },
                    plugins: {
                        legend: { 
                            position: 'top', 
                            align: 'end', 
                            labels: { 
                                usePointStyle: true, 
                                boxWidth: 8, 
                                font: { family: "'Inter', sans-serif", size: 12, weight: '600' },
                                color: '#94a3b8',
                                padding: 20
                            } 
                        },
                        tooltip: { 
                            backgroundColor: 'rgba(255, 255, 255, 0.95)', 
                            titleColor: '#0f172a',
                            bodyColor: '#334155',
                            borderColor: '#e2e8f0',
                            borderWidth: 1,
                            padding: 12, 
                            cornerRadius: 8,
                            titleFont: { family: "'Inter', sans-serif", size: 13, weight: 'bold' },
                            bodyFont: { family: "'Inter', sans-serif", size: 12, weight: '500' },
                            usePointStyle: true,
                            boxPadding: 6
                        }
                    }
                }
            });
        },

        renderDonutChart: (rate) => {
            const ctx = document.getElementById('collectionRateChart');
            if (!ctx) return;
            if (CRM.donutChartInstance) CRM.donutChartInstance.destroy();

            const remain = Math.max(0, 100 - rate);

            CRM.donutChartInstance = new Chart(ctx.getContext('2d'), {
                type: 'doughnut',
                data: {
                    labels: ['Converted', 'Missed'],
                    datasets: [{
                        data: [rate, remain],
                        backgroundColor: ['#2563eb', '#f1f5f9'],
                        borderWidth: 0,
                        hoverOffset: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '75%',
                    plugins: { legend: { display: false }, tooltip: { enabled: false } }
                }
            });
        },

        renderProspectChart: (prospectData) => {
            const ctx = document.getElementById('prospectLevelChart');
            if (!ctx) return;
            if (CRM.prospectChartInstance) CRM.prospectChartInstance.destroy();

            // Mapped buckets based on user's exact specification
            const buckets = {
                'Potensial': 0,
                'Negosiasi': 0,
                'Menunggu': 0,
                'Berhasil': 0,
                'Gagal': 0
            };

            for (const key in prospectData) {
                const count = prospectData[key];
                const sl = String(key).toLowerCase();
                if (sl.includes('hot') || sl.includes('berhasil') || sl.includes('won')) {
                    buckets['Berhasil'] += count;
                } else if (sl.includes('nego') || sl.includes('warm') || sl.includes('warming')) {
                    buckets['Negosiasi'] += count;
                } else if (sl.includes('tunggu') || sl.includes('follow') || sl.includes('waiting') || sl.includes('menunggu')) {
                    buckets['Menunggu'] += count;
                } else if (sl.includes('gagal') || sl.includes('lost') || sl.includes('reject') || sl.includes('drop')) {
                    buckets['Gagal'] += count;
                } else {
                    buckets['Potensial'] += count; // everything else mapped to Potensial
                }
            }
            
            const labels = Object.keys(buckets);
            const dataArr = Object.values(buckets);
            // Colors: Blue, Orange, Yellow, Green, Red
            const colors = ['#38bdf8', '#fb923c', '#fbbf24', '#10b981', '#ef4444'];

            // Custom plugin to draw numbers exactly above bars
            const drawValuesPlugin = {
                id: 'customDataLabels',
                afterDatasetsDraw(chart, args, pluginOptions) {
                    const { ctx } = chart;
                    chart.data.datasets.forEach((dataset, i) => {
                        const meta = chart.getDatasetMeta(i);
                        if (!meta.hidden) {
                            meta.data.forEach((element, index) => {
                                ctx.fillStyle = '#64748b';
                                ctx.font = 'bold 11px Inter, sans-serif';
                                const dataString = dataset.data[index].toString();
                                ctx.textAlign = 'center';
                                ctx.textBaseline = 'bottom';
                                const position = element.tooltipPosition();
                                ctx.fillText(dataString, position.x, position.y - 4);
                            });
                        }
                    });
                }
            };

            CRM.prospectChartInstance = new Chart(ctx.getContext('2d'), {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        data: dataArr,
                        backgroundColor: colors,
                        borderRadius: 4,
                        barThickness: 'flex',
                        maxBarThickness: 32
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: { 
                            grid: { display: false }, 
                            ticks: { 
                                font: { size: 10, weight: 'bold' }, 
                                color: '#64748b',
                                autoSkip: false,
                                maxRotation: 0,
                                minRotation: 0
                            } 
                        },
                        y: { 
                            beginAtZero: true, 
                            border: { display: false }, 
                            grid: { display: false }, 
                            ticks: { display: false },
                            grace: '20%' // Add headroom memory capacity for top text
                        }
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: { backgroundColor: '#1e293b', padding: 8, titleFont: { size: 10 } }
                    },
                    layout: {
                        padding: { top: 15, bottom: 5 }
                    }
                },
                plugins: [drawValuesPlugin] // Inject the custom plugin here
            });
        },

        loadTraffic: () => {
            document.getElementById('trafficLoader').classList.remove('hidden');
            
            google.script.run
                .withSuccessHandler(res => {
                    document.getElementById('trafficLoader').classList.add('hidden');
                    if (res.success) {
                        CRM.trafficDataCache = res.data;
                        CRM.renderTrafficTable(res.data);
                        CRM.showToast('Traffic data synchronized!');
                    } else {
                        CRM.showToast(res.message, true);
                    }
                })
                .withFailureHandler(err => {
                    document.getElementById('trafficLoader').classList.add('hidden');
                    CRM.showToast('Fetch error: ' + err.message, true);
                })
                .getCrmTrafficData();
        },

        renderTrafficTable: (data) => {
            const tbody = document.getElementById('tbTrafficBody');
            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="py-8 text-center text-slate-400">No records found.</td></tr>';
                document.getElementById('valTrafficCount').textContent = 0;
                return;
            }

            let html = '';
            data.forEach(row => {
                // Status Color Logic
                let stColor = 'bg-slate-100 text-slate-600';
                const st = String(row.status).toLowerCase();
                if(st.includes('walk')) stColor = 'bg-cyan-100 text-cyan-700';
                else if(st.includes('follow')) stColor = 'bg-amber-100 text-amber-700';
                else if(st.includes('delivery')) stColor = 'bg-indigo-100 text-indigo-700';
                else if(st.includes('online')) stColor = 'bg-purple-100 text-purple-700';
                else if(st.includes('repair') || st.includes('service')) stColor = 'bg-rose-100 text-rose-700';

                html += `<tr class="hover:bg-slate-50/50 transition-colors">
                    <td class="py-4 px-6 whitespace-nowrap text-xs text-slate-500">${row.date}</td>
                    <td class="py-4 px-6 whitespace-nowrap font-bold text-slate-800">${row.clientName || '-'}</td>
                    <td class="py-4 px-6 whitespace-nowrap text-sm">${row.advisor || '-'}</td>
                    <td class="py-4 px-6 whitespace-nowrap">
                        <span class="px-2.5 py-1 rounded-md text-[10px] font-bold uppercase tracking-wider ${stColor}">${row.status || '-'}</span>
                    </td>
                    <td class="py-4 px-6 whitespace-nowrap text-xs text-slate-600 font-semibold">${row.level || '-'}</td>
                    <td class="py-4 px-6 whitespace-nowrap text-xs text-slate-500 text-right">${row.location || '-'}</td>
                </tr>`;
            });
            tbody.innerHTML = html;
            document.getElementById('valTrafficCount').textContent = data.length.toLocaleString('id-ID');
        },

        searchTraffic: () => {
            const query = document.getElementById('inpSearchTraffic').value.toLowerCase();
            if (!query) {
                CRM.renderTrafficTable(CRM.trafficDataCache);
                return;
            }
            const filtered = CRM.trafficDataCache.filter(r => {
                return (r.clientName.toLowerCase().includes(query) || 
                        r.advisor.toLowerCase().includes(query) ||
                        r.status.toLowerCase().includes(query));
            });
            CRM.renderTrafficTable(filtered);
        },

        // ==========================
        // PROFILING LOGIC
        // ==========================
        loadProfiling: () => {
            document.getElementById('profilingLoader').classList.remove('hidden');
            
            google.script.run
                .withSuccessHandler(res => {
                    document.getElementById('profilingLoader').classList.add('hidden');
                    if (res.success) {
                        CRM.profilingDataCache = { headers: res.headers, rows: res.rows };
                        CRM.renderProfilingTable(res.headers, res.rows);
                        CRM.showToast('Profiling data extracted successfully!');
                    } else {
                        CRM.showToast(res.message, true);
                    }
                })
                .withFailureHandler(err => {
                    document.getElementById('profilingLoader').classList.add('hidden');
                    CRM.showToast('Fetch error: ' + err.message, true);
                })
                .getCrmProfilingData();
        },

        renderProfilingTable: (headers, rows) => {
            const thead = document.getElementById('trProfilingHead');
            const tbody = document.getElementById('tbProfilingBody');
            
            if (!headers || headers.length === 0) {
                tbody.innerHTML = '<tr><td class="py-8 text-center text-slate-400">No layout found in source sheet.</td></tr>';
                return;
            }

            // Draw Headers
            let hHtml = '';
            headers.forEach(h => {
                hHtml += `<th class="py-4 px-6 text-[10px] font-bold text-slate-400 uppercase tracking-widest">${h}</th>`;
            });
            thead.innerHTML = hHtml;

            // Draw Rows
            if (!rows || rows.length === 0) {
                tbody.innerHTML = `<tr><td colspan="${headers.length}" class="py-8 text-center text-slate-400">No record data found.</td></tr>`;
                document.getElementById('valProfilingCount').textContent = 0;
                document.getElementById('valProfilingCols').textContent = headers.length;
                return;
            }

            let bHtml = '';
            rows.forEach(r => {
                bHtml += `<tr class="hover:bg-slate-50/50 transition-colors">`;
                r.forEach((cell, idx) => {
                    // First col is bolder (usually Date or Name)
                    if (idx === 0) {
                        bHtml += `<td class="py-4 px-6 whitespace-nowrap text-xs font-bold text-slate-600">${cell || '-'}</td>`;
                    } else {
                        // Truncate long notes if any, usually profiling has long text
                        let displayTxt = cell || '-';
                        if(displayTxt.length > 50) displayTxt = displayTxt.substring(0, 47) + '...';
                        bHtml += `<td class="py-4 px-6 whitespace-nowrap text-xs text-slate-500" title="${cell}">${displayTxt}</td>`;
                    }
                });
                bHtml += `</tr>`;
            });
            tbody.innerHTML = bHtml;
            document.getElementById('valProfilingCount').textContent = rows.length.toLocaleString('id-ID');
            document.getElementById('valProfilingCols').textContent = headers.length;
        },

        searchProfiling: () => {
            const query = document.getElementById('inpSearchProfiling').value.toLowerCase();
            const { headers, rows } = CRM.profilingDataCache;
            
            if (!query) {
                CRM.renderProfilingTable(headers, rows);
                return;
            }
            
            const filtered = rows.filter(r => {
                // Search across all columns in the row
                return r.some(cell => String(cell).toLowerCase().includes(query));
            });
            CRM.renderProfilingTable(headers, filtered);
        },

        // ==========================
        // CLEAN SYSTEM LOGIC
        // ==========================
        cleanPayloadCache: [],

        logTerminal: (message, type="info") => {
            const term = document.getElementById('terminalOutput');
            const color = type === 'error' ? 'text-red-400' : type === 'success' ? 'text-brand-accent' : 'text-emerald-400';
            const timestamp = new Date().toLocaleTimeString('id-ID', { hour12: false });
            term.innerHTML += `<div class="${color}">[${timestamp}] ${message}</div>`;
            term.scrollTop = term.scrollHeight; // Auto scroll to bottom
        },

        analyzeCleanSystem: () => {
            const btn = document.getElementById('btnRunClean');
            btn.innerHTML = '<iconify-icon icon="svg-spinners:ring-resize" class="text-xl"></iconify-icon> Scanning...';
            btn.classList.add('cursor-not-allowed', 'opacity-80');
            btn.disabled = true;
            
            CRM.logTerminal('> Memulai pemindaian data (Dry Run)...', 'info');

            google.script.run
                .withSuccessHandler(res => {
                    btn.innerHTML = '<iconify-icon icon="lucide:scan" class="text-xl"></iconify-icon> Scan Data Mismatch';
                    btn.classList.remove('cursor-not-allowed', 'opacity-80');
                    btn.disabled = false;

                    if (res.success) {
                         const rLen = res.readyToSync.length;
                         const mLen = res.missingProfile.length;
                         
                         CRM.logTerminal(`> Pemindaian selesai! Mismatch: ${mLen} baris | Ready: ${rLen} baris.`, 'success');
                         
                         // Simpan raw array buat dikirim saat commit
                         CRM.cleanPayloadCache = res.readyToSync.map(item => item.payload);
                         
                         // Tampilkan Container Previews
                         document.getElementById('cleanPreviewModule').classList.remove('hidden');
                         
                         // Render Mismatch Table
                         document.getElementById('badgeMismatch').textContent = mLen + ' Rows';
                         const tbm = document.getElementById('tbMismatchBody');
                         if(mLen === 0) {
                             tbm.innerHTML = '<tr><td colspan="3" class="py-4 text-center text-rose-300 font-medium">Bagus! Tidak ada kebocoran data.</td></tr>';
                         } else {
                             let mHtml = '';
                             res.missingProfile.forEach(m => {
                                 mHtml += `<tr class="hover:bg-rose-50/80 transition-colors">
                                     <td class="py-3 px-6 text-xs text-rose-500">${m.date || '-'}</td>
                                     <td class="py-3 px-6 text-xs font-bold text-slate-800">${m.name || '-'}</td>
                                     <td class="py-3 px-6 text-xs text-rose-600">${m.advisor || '-'}</td>
                                 </tr>`;
                             });
                             tbm.innerHTML = mHtml;
                         }
                         
                         // Render Ready Table
                         document.getElementById('badgeReady').textContent = rLen + ' Rows';
                         const tbr = document.getElementById('tbReadyBody');
                         if(rLen === 0) {
                             tbr.innerHTML = '<tr><td colspan="3" class="py-4 text-center text-emerald-300 font-medium">Tidak ada data baru yang siap disinkronisasi.</td></tr>';
                             document.getElementById('btnCommitSync').classList.add('hidden');
                         } else {
                             let rHtml = '';
                             res.readyToSync.forEach(r => {
                                 rHtml += `<tr class="hover:bg-emerald-50/80 transition-colors">
                                     <td class="py-3 px-6 text-xs font-bold text-slate-800">${r.name || '-'}</td>
                                     <td class="py-3 px-6 text-xs font-mono text-slate-500">${r.phone || '-'}</td>
                                     <td class="py-3 px-6 text-xs font-bold text-emerald-600">${r.netSales || '-'}</td>
                                 </tr>`;
                             });
                             tbr.innerHTML = rHtml;
                             document.getElementById('btnCommitSync').classList.remove('hidden');
                         }
                    } else {
                         CRM.logTerminal(`> FAILED ERROR: ${res.message}`, 'error');
                         CRM.showToast(res.message, true);
                    }
                })
                .withFailureHandler(err => {
                    btn.innerHTML = '<iconify-icon icon="lucide:scan" class="text-xl"></iconify-icon> Scan Data Mismatch';
                    btn.classList.remove('cursor-not-allowed', 'opacity-80');
                    btn.disabled = false;
                    
                    CRM.logTerminal(`> FATAL ERROR: ${err.message}`, 'error');
                    CRM.showToast('Fetch error: ' + err.message, true);
                })
                .analyzeCleanData();
        },

        commitCleanSystem: () => {
             if(CRM.cleanPayloadCache.length === 0) return;
             
             const btn = document.getElementById('btnCommitSync');
             btn.innerHTML = '<iconify-icon icon="svg-spinners:ring-resize" class="text-xl"></iconify-icon> Committing...';
             btn.classList.add('cursor-not-allowed', 'opacity-50');
             btn.disabled = true;
             
             CRM.logTerminal(`> Menyuntikkan ${CRM.cleanPayloadCache.length} baris ke Clean Master...`, 'info');
             
             google.script.run
                .withSuccessHandler(res => {
                    if(res.success) {
                        CRM.logTerminal(`> SUCCESS! ${res.count} baris tersimpan permanen.`, 'success');
                        CRM.showToast(`Berhasil menyimpan ${res.count} data!`);
                        btn.innerHTML = '<iconify-icon icon="lucide:check-circle" class="text-xl"></iconify-icon> Synced Successfully';
                        CRM.cleanPayloadCache = [];
                    } else {
                        btn.innerHTML = '<iconify-icon icon="lucide:check-check" class="text-xl"></iconify-icon> Commit to Master Target';
                        btn.classList.remove('cursor-not-allowed', 'opacity-50');
                        btn.disabled = false;
                        CRM.logTerminal(`> ERROR COMMIT: ${res.message}`, 'error');
                        CRM.showToast(res.message, true);
                    }
                })
                .withFailureHandler(err => {
                    btn.innerHTML = '<iconify-icon icon="lucide:check-check" class="text-xl"></iconify-icon> Commit to Master Target';
                    btn.classList.remove('cursor-not-allowed', 'opacity-50');
                    btn.disabled = false;
                    CRM.logTerminal(`> ERROR COMMIT: ${err.message}`, 'error');
                    CRM.showToast('Commit error: ' + err.message, true);
                })
                .commitCleanData(CRM.cleanPayloadCache);
        }
    };

    // Init
    window.onload = () => {
        const d = new Date();
        const mObj = document.getElementById('crmFilterMonth');
        const yObj = document.getElementById('crmFilterYear');
        if(mObj) mObj.value = d.getMonth();
        if(yObj) yObj.value = d.getFullYear();
        
        try {
            const savedUser = localStorage.getItem('crmUser');
            if (savedUser) {
                const userObj = JSON.parse(savedUser);
                CRM.currentUser = userObj;
                
                document.getElementById('userNameLabel').textContent = userObj.name;
                document.getElementById('userRoleLabel').textContent = userObj.role;
                document.getElementById('userAvatar').textContent = String(userObj.name).charAt(0).toUpperCase();

                CRM.navigate('app-shell');
                CRM.switchTab('dashboard');
                CRM.loadDashboard(); // Load data dashboard otomatis
                
                CRM.showToast('Sesi dilanjutkan: ' + userObj.name);
                return;
            }
        } catch(e) {
            localStorage.removeItem('crmUser');
        }

        CRM.navigate('login');
    };
</script>
