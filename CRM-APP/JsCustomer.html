<!-- JsCustomer.html -->
<script>
const CUSTOMER = {
    rawData: [],
    
    init: function() {
        // Hanya kosongkan state, biarkan user klik Load Data
        this.rawData = [];
        this.renderCards(null);
    },

    loadData: function() {
        // Show loading state
        const tbody = document.getElementById('tblCustomerMaster');
        if(tbody) {
            tbody.innerHTML = `<tr><td colspan="8" class="px-5 py-16 text-center text-slate-400 font-medium"><iconify-icon icon="svg-spinners:ring-resize" class="text-3xl text-blue-500 mb-3 block mx-auto"></iconify-icon><div>Sedang menarik database pelanggan dari server...</div></td></tr>`;
        }

        google.script.run.withSuccessHandler(res => {
            if(res.success) {
                CUSTOMER.rawData = res.data;
                CUSTOMER.renderCards(res.stats);
                CUSTOMER.renderTable(CUSTOMER.rawData);
            } else {
                Swal.fire({
                    icon: 'error',
                    title: 'Fetch Failed',
                    text: res.message,
                    confirmButtonColor: '#0f172a'
                });
                if(tbody) tbody.innerHTML = `<tr><td colspan="8" class="text-center py-10 text-rose-500 font-bold">${res.message}</td></tr>`;
            }
        }).withFailureHandler(err => {
             Swal.fire('Error', String(err), 'error');
        }).getCustomerMasterList();
    },

    syncData: function() {
        Swal.fire({
            title: 'Mulai Sinkronisasi?',
            text: "Ini akan membaca seluruh data Clean Transaksi untuk menghitung ulang LTV dan memperbarui Tier. Lanjutkan?",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#3b82f6',
            cancelButtonColor: '#64748b',
            confirmButtonText: 'Ya, Sinkronisasi',
            cancelButtonText: 'Batal'
        }).then((result) => {
            if (result.isConfirmed) {
                Swal.fire({
                    title: 'Memproses...',
                    html: 'Sedang menghitung triliunan data transaksi \u23F3',
                    allowOutsideClick: false,
                    didOpen: () => { Swal.showLoading(); }
                });

                google.script.run.withSuccessHandler(res => {
                    if(res.success) {
                        Swal.fire('Berhasil!', res.message + ` (${res.count} pelanggan diperbarui)`, 'success');
                        CUSTOMER.loadData(); // Reload UI
                    } else {
                        Swal.fire('Gagal', res.message, 'error');
                    }
                }).withFailureHandler(err => {
                    Swal.fire('Error', String(err), 'error');
                }).syncCustomerMaster();
            }
        });
    },

    getTierBadge: function(tier) {
        tier = String(tier).trim();
        switch(tier) {
            case 'Top Spender':
                return `<span class="px-3 py-1 bg-gradient-to-r from-amber-200 to-yellow-400 text-yellow-900 border border-yellow-500/50 rounded-full text-[10px] font-black uppercase tracking-widest shadow-[0_0_10px_rgba(251,191,36,0.5)] flex items-center justify-center gap-1"><iconify-icon icon="lucide:crown"></iconify-icon> TOP</span>`;
            case 'Elite':
                return `<span class="px-3 py-1 bg-purple-100 text-purple-700 border border-purple-200 rounded-full text-[10px] font-bold uppercase tracking-widest flex items-center justify-center gap-1 shadow-sm"><iconify-icon icon="lucide:gem"></iconify-icon> ELITE</span>`;
            case 'High Potential':
                return `<span class="px-3 py-1 bg-teal-50 text-teal-700 border border-teal-200 rounded-full text-[10px] font-bold uppercase tracking-widest flex items-center justify-center shadow-sm">HIGH POT</span>`;
            case 'Potential':
                return `<span class="px-3 py-1 bg-blue-50 text-blue-600 border border-blue-200 rounded-full text-[10px] font-bold uppercase tracking-widest flex items-center justify-center shadow-sm">POTENTIAL</span>`;
            case 'Prospect':
                return `<span class="px-3 py-1 bg-slate-100 text-slate-500 border border-slate-200 rounded-full text-[10px] font-bold uppercase tracking-widest flex items-center justify-center shadow-sm">PROSPECT</span>`;
            case 'Inactive':
                return `<span class="px-3 py-1 bg-rose-50 text-rose-600 border border-rose-200 rounded-full text-[10px] font-bold uppercase tracking-widest flex items-center justify-center shadow-sm">INACTIVE</span>`;
            default:
                return `<span class="px-3 py-1 bg-slate-100 text-slate-600 rounded-full text-[10px] font-bold uppercase">${tier}</span>`;
        }
    },

    renderCards: function(stats) {
        if(!stats) {
            document.getElementById('kfTotalCust').innerText = "0";
            document.getElementById('kfTotalTop').innerText = "0";
            document.getElementById('kfTotalElite').innerText = "0";
            document.getElementById('kfTotalInactive').innerText = "0";
            return;
        }
        document.getElementById('kfTotalCust').innerText = (stats.totalCustomers || 0).toLocaleString('id-ID');
        document.getElementById('kfTotalTop').innerText = (stats.tiers['Top Spender'] || 0).toLocaleString('id-ID');
        document.getElementById('kfTotalElite').innerText = (stats.tiers['Elite'] || 0).toLocaleString('id-ID');
        document.getElementById('kfTotalInactive').innerText = (stats.tiers['Inactive'] || 0).toLocaleString('id-ID');
        
        const countLbl = document.getElementById('lblCustomerCount');
        if(countLbl) countLbl.innerText = `${(stats.totalCustomers || 0).toLocaleString('id-ID')} Records`;
    },

    renderTable: function(dataArray) {
        const tbody = document.getElementById('tblCustomerMaster');
        if(!tbody) return;

        if(!dataArray || dataArray.length === 0) {
            tbody.innerHTML = `<tr><td colspan="8" class="text-center py-12 text-slate-400 font-medium">Data kosong. Silakan tekan tombol Sync.</td></tr>`;
            return;
        }

        let html = '';
        dataArray.forEach(row => {
            const formatedSpend = new Intl.NumberFormat('id-ID').format(Math.round(row.spend));
            // Escape single quotes for the onclick handler
            const safeName = String(row.name).replace(/'/g, "\\'");
            const safePhone = String(row.phone).replace(/'/g, "\\'");
            const safeTier = String(row.tier).replace(/'/g, "\\'");
            const safeAdv = String(row.advisor).replace(/'/g, "\\'");
            
            // Format WhatsApp Link (SAFE DARI ERROR PARSER)
            let waDisplay = '-';
            if (row.phone && row.phone !== '-' && row.phone.length > 6) {
                const cleanWa = String(row.phone).replace(/^0/, '62').replace(/\D/g, '');
                waDisplay = '<a href="https://wa.me/' + cleanWa + '" target="_blank" onclick="event.stopPropagation()" class="text-slate-400 hover:text-green-500 hover:underline inline-flex items-center gap-1 transition-colors"><iconify-icon icon="logos:whatsapp-icon" class="text-[10px] grayscale hover:grayscale-0"><' + '/iconify-icon>' + row.phone + '<' + '/a>';
            } else if (row.phone && row.phone !== '-') {
                waDisplay = row.phone;
            }

            html += '<tr onclick="CUSTOMER.openClient360(\'' + safeName + '\', \'' + safePhone + '\', \'' + safeTier + '\', \'' + safeAdv + '\', ' + row.spend + ', ' + row.freq + ')" class="cursor-pointer hover:bg-slate-50 transition-colors group">' +
                '<td class="px-5 py-3 align-middle">' + this.getTierBadge(row.tier) + '<' + '/td>' +
                '<td class="px-5 py-3">' +
                    '<div class="font-bold text-slate-800 text-[13px] capitalize">' + String(row.name).toLowerCase() + '<' + '/div>' +
                    '<div class="text-[10px] font-mono mt-0.5">' + waDisplay + '<' + '/div>' +
                '<' + '/td>' +
                '<td class="px-5 py-3 text-right">' +
                    '<div class="font-mono font-bold text-slate-800 text-[13px]">' + formatedSpend + '<' + '/div>' +
                '<' + '/td>' +
                '<td class="px-5 py-3 text-center text-[12px] font-bold text-slate-600">' + row.freq + '<' + '/td>' +
                '<td class="px-5 py-3 text-center">' +
                    '<span class="px-2 py-1 bg-indigo-50 text-indigo-700 rounded text-[10px] font-bold uppercase tracking-wider border border-indigo-100/50">' + row.advisor + '<' + '/span>' +
                '<' + '/td>' +
                '<td class="px-5 py-3 text-[11px] text-slate-500 font-medium">' + row.lastDate + '<' + '/td>' +
            '<' + '/tr>';
        });
        
        tbody.innerHTML = html;
        
        // Update label count if filtering
        const countLbl = document.getElementById('lblCustomerCount');
        if(countLbl && dataArray.length !== CUSTOMER.rawData.length) {
             countLbl.innerText = `Menampilkan ${dataArray.length.toLocaleString('id-ID')} dari ${CUSTOMER.rawData.length.toLocaleString('id-ID')} Records`;
        } else if (countLbl) {
             countLbl.innerText = `${CUSTOMER.rawData.length.toLocaleString('id-ID')} Records`;
        }
    },

    search: function() {
        const val = document.getElementById('custMasterSearch').value.toLowerCase().trim();
        if(!val) {
            this.renderTable(this.rawData);
            return;
        }

        const filtered = this.rawData.filter(row => {
            return String(row.name).toLowerCase().includes(val) || 
                   String(row.phone).toLowerCase().includes(val) ||
                   String(row.tier).toLowerCase().includes(val) ||
                   String(row.advisor).toLowerCase().includes(val);
        });

        this.renderTable(filtered);
    },
    
    _sortAsc: false,
    sortBySpend: function() {
        this._sortAsc = !this._sortAsc;
        
        // Buat copy array biar gak rusak kalau nge filter
        let currentData = [...this.rawData]; 
        
        // Filter aktif cek input 
        const val = document.getElementById('custMasterSearch').value.toLowerCase().trim();
        if(val) {
             currentData = currentData.filter(row => {
                 return String(row.name).toLowerCase().includes(val) || 
                        String(row.phone).toLowerCase().includes(val);
             });
        }
        
        currentData.sort((a,b) => {
            if(this._sortAsc) return a.spend - b.spend;
            return b.spend - a.spend;
        });
        
        this.renderTable(currentData);
    },

    // -------------------------------------------------------------
    // CLIENT 360 VAULT MODAL
    // -------------------------------------------------------------
    openClient360: function(name, phone, tier, advisor, spend, freq) {
        // Populasikan UI Header
        document.getElementById('c360Name').innerText = name;
        
        let c360Wa = phone || '-';
        if (phone && phone !== '-' && phone.length > 6) {
             const cleanWa = String(phone).replace(/^0/, '62').replace(/\D/g, '');
             c360Wa = '<a href="https://wa.me/' + cleanWa + '" target="_blank" class="hover:text-green-500 hover:underline inline-flex items-center gap-1 transition-colors"><iconify-icon icon="logos:whatsapp-icon" class="text-xs grayscale hover:grayscale-0"><' + '/iconify-icon>' + phone + '<' + '/a>';
        }
        document.getElementById('c360Phone').innerHTML = c360Wa;

        document.getElementById('c360TierBadge').innerHTML = this.getTierBadge(tier);
        document.getElementById('c360Avatar').innerText = String(name).charAt(0).toUpperCase();
        document.getElementById('c360MainAdv').innerText = advisor || '-';
        document.getElementById('c360Freq').innerText = freq || '0';
        document.getElementById('c360TotalSpend').innerText = new Intl.NumberFormat('id-ID').format(Math.round(spend));

        const tbody = document.getElementById('tblClient360');
        tbody.innerHTML = '<tr><td colspan="4" class="px-5 py-20 text-center text-slate-400 text-xs"><iconify-icon icon="svg-spinners:pulse-rings-multiple" class="text-3xl text-blue-500 mb-2 block mx-auto"><' + '/iconify-icon>Membuka brankas Supabase... (Historical Vault)<' + '/td><' + '/tr>';

        // Tampilkan Modal dengan Animasi Timbul (Fade-in)
        const modal = document.getElementById('modalClient360');
        const content = document.getElementById('modalClient360Content');
        modal.classList.remove('hidden');
        // Trigger reflow untuk animasi
        void modal.offsetWidth; 
        modal.classList.remove('opacity-0');
        content.classList.remove('scale-95');

        // Fetch data transactions
        google.script.run.withSuccessHandler(res => {
            if(res.success) {
                if(res.data.length === 0) {
                     tbody.innerHTML = '<tr><td colspan="4" class="py-12 text-center text-slate-400 italic">Tidak ada rekam jejak transaksi mentah ditemukan.<' + '/td><' + '/tr>';
                } else {
                     let tHtml = '';
                     res.data.forEach(tr => {
                         const netFmt = new Intl.NumberFormat('id-ID').format(Math.round(tr.net));
                         tHtml += '<tr class="hover:bg-slate-50 transition-colors">' +
                             '<td class="px-5 py-3 font-mono font-medium">' + tr.date + '<' + '/td>' +
                             '<td class="px-5 py-3"><span class="px-2 py-1 bg-slate-100 rounded text-[10px] uppercase font-bold text-slate-600">' + tr.location + '<' + '/span><' + '/td>' +
                             '<td class="px-5 py-3 text-right font-mono font-bold text-slate-800">' + netFmt + '<' + '/td>' +
                             '<td class="px-5 py-3 text-center font-medium capitalize">' + tr.advisor + '<' + '/td>' +
                         '<' + '/tr>';
                     });
                     tbody.innerHTML = tHtml;
                }
            } else {
                tbody.innerHTML = `<tr><td colspan="4" class="py-10 text-center text-rose-500 font-bold">${res.message}</td></tr>`;
            }
        }).withFailureHandler(err => {
            tbody.innerHTML = `<tr><td colspan="4" class="py-10 text-center text-rose-500 font-bold">Koneksi Supabase terputus.</td></tr>`;
        }).getClient360Data(name);
    },

    closeClient360: function() {
        const modal = document.getElementById('modalClient360');
        const content = document.getElementById('modalClient360Content');
        
        modal.classList.add('opacity-0');
        content.classList.add('scale-95');
        
        setTimeout(() => {
            modal.classList.add('hidden');
        }, 300); // 300ms transition time
    }
};
</script>
