<script>
    /**
     * CRM MODULE - MODULAR CONTROLLER
     * Khusus menangani data dari Sheet Traffic & CRM
     */
    const CRM = {
        // Fungsi untuk merender Funnel di menu baru
        renderFunnel: (data) => {
            const container = document.getElementById('crmFunnelContainer');
            if (!container || !data.trafficFunnel) return;

            const tf = data.trafficFunnel;
            const elCrmTotal = document.getElementById('crmFunnelTotal');
            if (elCrmTotal) elCrmTotal.innerText = `${tf.total} Prospects Processed`;

            const cards = [
                { label: "Potensial Baru", val: tf.potensial, colorClass: "text-blue-600 bg-blue-50 border-blue-200", icon: `<svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/></svg>` },
                { label: "Menunggu Respon", val: tf.menunggu, colorClass: "text-yellow-600 bg-yellow-50 border-yellow-200", icon: `<svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>` },
                { label: "Dalam Negosiasi", val: tf.nego, colorClass: "text-purple-600 bg-purple-50 border-purple-200", icon: `<svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>` },
                { label: "Penjualan Berhasil", val: tf.berhasil, colorClass: "text-emerald-600 bg-emerald-50 border-emerald-200", icon: `<svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/></svg>` },
                { label: "Penjualan Gagal", val: tf.gagal, colorClass: "text-rose-500 bg-rose-50 border-rose-200", icon: `<svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/></svg>` }
            ];

            let html = "";
            cards.forEach(c => {
                const shortLabel = c.label.split(' ')[0]; // Ambil kata pertama untuk label kecil
                html += `
                <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm hover:shadow-md transition-all group flex flex-col justify-between min-h-[140px]">
                    <div class="flex justify-between items-start mb-4">
                        <div class="w-10 h-10 rounded-xl flex items-center justify-center shrink-0 border shadow-sm ${c.colorClass}">
                            ${c.icon}
                        </div>
                        <span class="text-[10px] font-bold text-slate-300 uppercase tracking-widest text-right leading-tight max-w-[60%]">${c.label}</span>
                    </div>
                    <div>
                        <div class="text-[10px] font-bold text-slate-400 mb-0.5">${shortLabel}</div>
                        <div class="text-3xl font-display font-bold text-slate-800 tracking-tight leading-none">${c.val}</div>
                    </div>
                </div>`;
            });

            container.innerHTML = html;
        },

        // Render Status Kedatangan + Location Traffic KPI Cards
        renderStatusKedatangan: (data) => {
            const statusContainer = document.getElementById('crmStatusContainer');
            const locContainer = document.getElementById('crmLocationContainer');
            if (!statusContainer || !data.statusKedatangan) return;

            const sk = data.statusKedatangan;
            const lt = data.locationTraffic || { pi: 0, ps: 0, bali: 0 };

            const statusCards = [
                { label: "Walk In", val: sk.walkIn, colorClass: "text-cyan-600 bg-cyan-50 border-cyan-200", icon: `<svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg>` },
                { label: "Follow Up", val: sk.followUp, colorClass: "text-amber-600 bg-amber-50 border-amber-200", icon: `<svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>` },
                { label: "Delivery & Showing", val: sk.delivery, colorClass: "text-indigo-600 bg-indigo-50 border-indigo-200", icon: `<svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>` }
            ];

            const locCards = [
                { label: "Plaza Indonesia", val: lt.pi, colorClass: "text-blue-600 bg-blue-50 border-blue-200", icon: `<svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>` },
                { label: "Plaza Senayan", val: lt.ps, colorClass: "text-emerald-600 bg-emerald-50 border-emerald-200", icon: `<svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>` },
                { label: "Bali", val: lt.bali, colorClass: "text-orange-600 bg-orange-50 border-orange-200", icon: `<svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>` }
            ];

            const renderCards = (cards) => {
                let html = '';
                cards.forEach(c => {
                    html += `
                    <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm hover:shadow-md transition-all group flex flex-col justify-between min-h-[120px]">
                        <div class="flex justify-between items-start mb-3">
                            <div class="w-10 h-10 rounded-xl flex items-center justify-center shrink-0 border shadow-sm ${c.colorClass}">
                                ${c.icon}
                            </div>
                            <span class="text-[10px] font-bold text-slate-300 uppercase tracking-widest text-right leading-tight">${c.label}</span>
                        </div>
                        <div class="text-3xl font-display font-bold text-slate-800 tracking-tight leading-none">${c.val}</div>
                    </div>`;
                });
                return html;
            };

            statusContainer.innerHTML = renderCards(statusCards);
            if (locContainer) locContainer.innerHTML = renderCards(locCards);
        },

        // Render Location Traffic KPI Card (single card)
        renderLocationTraffic: (data) => {
            const card = document.getElementById('crmLocationCard');
            if (!card || !data.locationTraffic) return;

            const lt = data.locationTraffic;
            const max = Math.max(lt.pi, lt.ps, lt.bali, 1);

            const locations = [
                { label: 'Plaza Indonesia', val: lt.pi, color: 'bg-blue-500', bgLight: 'bg-blue-100' },
                { label: 'Plaza Senayan', val: lt.ps, color: 'bg-emerald-500', bgLight: 'bg-emerald-100' },
                { label: 'Bali', val: lt.bali, color: 'bg-amber-500', bgLight: 'bg-amber-100' }
            ];

            let html = `<div class="flex justify-between items-center mb-4">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 rounded-lg bg-violet-100 flex items-center justify-center text-violet-600">
                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                    </div>
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Total Kunjungan</span>
                </div>
                <span class="text-2xl font-display font-bold text-brand-dark">${lt.total}</span>
            </div>
            <div class="space-y-2.5">`;

            locations.forEach(loc => {
                const pct = max > 0 ? Math.round((loc.val / max) * 100) : 0;
                html += `<div class="flex items-center gap-3">
                    <span class="text-[11px] font-bold text-slate-600 w-28 shrink-0">${loc.label}</span>
                    <div class="flex-grow ${loc.bgLight} rounded-full h-5 overflow-hidden">
                        <div class="${loc.color} h-full rounded-full transition-all duration-700 flex items-center justify-end pr-2" style="width: ${pct}%">
                            <span class="text-[10px] font-bold text-white drop-shadow-sm">${loc.val}</span>
                        </div>
                    </div>
                </div>`;
            });

            html += '</div>';
            card.innerHTML = html;
        },

        // Trigger loading data khusus jika dipanggil (opsional, untuk extensionality)
        init: () => {
             console.log("CRM Module initialized.");
        },

        // Send CRM Email Report
        sendEmailReport: () => {
            const btn = document.getElementById('btnSendCrmEmail');
            if (btn) {
                btn.disabled = true;
                btn.innerHTML = `<svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" class="opacity-25"/><path fill="currentColor" class="opacity-75" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg> Sending...`;
            }
            const m = document.getElementById('monthSelect').value;
            const y = document.getElementById('yearSelect').value;
            google.script.run
                .withSuccessHandler(res => {
                    if (btn) {
                        btn.disabled = false;
                        btn.innerHTML = `<svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg> Send Report`;
                    }
                    if (res && res.success) {
                        UI.showToast('✅ ' + res.message);
                    } else {
                        UI.showToast('❌ ' + (res ? res.message : 'Unknown error'));
                    }
                })
                .withFailureHandler(err => {
                    if (btn) {
                        btn.disabled = false;
                        btn.innerHTML = `<svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg> Send Report`;
                    }
                    UI.showToast('❌ Error: ' + err.message);
                })
                .sendCRMEmailReport(m, y);
        },

        // Load prospect detail data from Traffic sheet
        loadProspectTable: () => {
            const m = document.getElementById('monthSelect').value;
            const y = document.getElementById('yearSelect').value;
            const loc = document.getElementById('crmFilterLocation').value;
            const prospect = document.getElementById('crmFilterProspect').value;
            const status = document.getElementById('crmFilterStatus').value;

            const countEl = document.getElementById('crmTableCount');
            if (countEl) countEl.innerText = 'Loading data...';

            const tbody = document.getElementById('crmProspectTableBody');
            if (tbody) tbody.innerHTML = `<tr><td colspan="7" class="py-16 text-center text-slate-400 text-xs"><div class="flex flex-col items-center gap-2"><div class="w-8 h-8 rounded-full border-2 border-slate-200 border-t-brand-blue animate-spin"></div><span>Fetching prospect data...</span></div></td></tr>`;

            google.script.run
                .withSuccessHandler(CRM.renderProspectTable)
                .withFailureHandler((err) => {
                    if (countEl) countEl.innerText = 'Error loading data';
                    if (tbody) tbody.innerHTML = `<tr><td colspan="7" class="py-16 text-center text-rose-500 text-xs">Error: ${err.message}</td></tr>`;
                })
                .getTrafficProspectData(m, y, loc, prospect, status);
        },

        // Render the prospect data table
        renderProspectTable: (data) => {
            if (data.error) {
                const countEl = document.getElementById('crmTableCount');
                if (countEl) countEl.innerText = data.error;
                return;
            }

            // Populate filter dropdowns (preserve current selection)
            const locSelect = document.getElementById('crmFilterLocation');
            const prospSelect = document.getElementById('crmFilterProspect');
            const statusSelect = document.getElementById('crmFilterStatus');
            const currentLoc = locSelect ? locSelect.value : 'ALL';
            const currentProsp = prospSelect ? prospSelect.value : 'ALL';
            const currentStatus = statusSelect ? statusSelect.value : 'ALL';

            if (locSelect && data.locations) {
                locSelect.innerHTML = '<option value="ALL">All Locations</option>';
                data.locations.forEach(l => {
                    const selected = (l === currentLoc) ? ' selected' : '';
                    locSelect.innerHTML += `<option value="${l}"${selected}>${l}</option>`;
                });
            }
            if (prospSelect && data.prospectLevels) {
                prospSelect.innerHTML = '<option value="ALL">All Prospect Levels</option>';
                data.prospectLevels.forEach(p => {
                    const selected = (p === currentProsp) ? ' selected' : '';
                    prospSelect.innerHTML += `<option value="${p}"${selected}>${p}</option>`;
                });
            }
            if (statusSelect && data.statuses) {
                statusSelect.innerHTML = '<option value="ALL">All Status</option>';
                data.statuses.forEach(s => {
                    const selected = (s === currentStatus) ? ' selected' : '';
                    statusSelect.innerHTML += `<option value="${s}"${selected}>${s}</option>`;
                });
            }

            // Update counter
            const countEl = document.getElementById('crmTableCount');
            if (countEl) countEl.innerText = `Showing ${data.rows.length} records`;

            // Render table rows
            const tbody = document.getElementById('crmProspectTableBody');
            if (!tbody) return;

            if (data.rows.length === 0) {
                tbody.innerHTML = `<tr><td colspan="8" class="py-16 text-center text-slate-400 italic text-xs">Tidak ada data prospek untuk filter ini.</td></tr>`;
                return;
            }

            // Color map for prospect levels
            const prospectColors = {
                'penjualan berhasil': 'text-emerald-700 bg-emerald-50 border-emerald-200',
                'penjualan gagal': 'text-rose-700 bg-rose-50 border-rose-200',
                'menunggu respon pelanggan': 'text-yellow-700 bg-yellow-50 border-yellow-200',
                'potensial pelanggan baru': 'text-blue-700 bg-blue-50 border-blue-200',
                'dalam tahap negosiasi': 'text-purple-700 bg-purple-50 border-purple-200'
            };

            let html = '';
            data.rows.forEach((row, idx) => {
                const pColor = prospectColors[row.prospectLevel.toLowerCase()] || 'text-slate-600 bg-slate-50 border-slate-200';
                html += `<tr class="hover:bg-slate-50 transition-colors group">
                    <td class="py-2.5 px-4 text-center text-slate-400 font-medium text-[10px]">${idx + 1}</td>
                    <td class="py-2.5 px-4 font-mono text-slate-600 text-[11px] whitespace-nowrap">${row.date}</td>
                    <td class="py-2.5 px-4 font-bold text-slate-700 group-hover:text-brand-blue transition-colors">${row.name}</td>
                    <td class="py-2.5 px-4 text-slate-500">${row.location}</td>
                    <td class="py-2.5 px-4 text-slate-500">${row.servedBy}</td>
                    <td class="py-2.5 px-4 text-slate-500">${row.status}</td>
                    <td class="py-2.5 px-4"><span class="px-2 py-0.5 rounded-full text-[10px] font-bold border ${pColor}">${row.prospectLevel}</span></td>
                    <td class="py-2.5 px-4 text-right font-mono font-bold text-brand-dark">${HELPERS.formatIDR(row.netSales || 0)}</td>
                </tr>`;
            });
            tbody.innerHTML = html;
        },

        // Export current prospect data to CSV (Excel-compatible)
        exportProspectCSV: () => {
            const tbody = document.getElementById('crmProspectTableBody');
            if (!tbody || tbody.rows.length === 0 || tbody.querySelector('td[colspan]')) {
                alert('Tidak ada data untuk di-download. Silakan klik "Load Data" terlebih dahulu.');
                return;
            }

            const m = document.getElementById('monthSelect').value;
            const y = document.getElementById('yearSelect').value;

            // BOM for Excel UTF-8 compatibility
            let csv = '\uFEFF';
            csv += 'No,Tanggal,Nama Lengkap,Lokasi Store,Served By,Status Kedatangan,Prospek Level,Net Sales (After Tax)\n';

            const rows = tbody.querySelectorAll('tr');
            rows.forEach((tr, idx) => {
                const cells = tr.querySelectorAll('td');
                if (cells.length >= 7) {
                    const row = [
                        idx + 1,
                        '"' + cells[1].innerText + '"',
                        '"' + cells[2].innerText + '"',
                        '"' + cells[3].innerText + '"',
                        '"' + cells[4].innerText + '"',
                        '"' + cells[5].innerText + '"',
                        '"' + cells[6].innerText + '"',
                        '"' + (cells[7] ? cells[7].innerText.replace(/,/g, '') : '0') + '"'
                    ];
                    csv += row.join(',') + '\n';
                }
            });

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `Prospect_Detail_${m}_${y}.csv`;
            link.style.display = 'none';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        },

        // Trigger Sales Sync from SAP (clean_master) mapped by Invoice
        syncSalesData: () => {
            Swal.fire({
                title: 'Konfirmasi Sync Sales (SAP)',
                html: `
                    <p class="text-sm text-slate-600 mb-3">Sistem akan mencari keterikatan <b>Nomor Invoice di Traffic (Kolom AP)</b> dengan database SAP.</p>
                    <div class="bg-amber-50 p-3 rounded-lg border border-amber-200 text-left text-xs text-amber-800 mb-2">
                        <p class="font-bold mb-1 flex items-center gap-1">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                            PERINGATAN:
                        </p>
                        <ul class="list-disc pl-4 space-y-1">
                            <li>Data <b>Nama, Item 1-10, Detail Item, & Angka Penjualan</b> pada baris tersebut <b>Akan Diubah/Tertimpa</b> otomatis.</li>
                            <li>Hanya baris dengan Nomor Invoice (AP) yang terisi yang akan disinkron.</li>
                            <li><i>Backup data Traffic sesaat sebelum diubah akan dibuat otomatis.</i></li>
                        </ul>
                    </div>
                    <p class="text-xs font-bold text-slate-700 mt-2">Apakah Anda yakin ingin mengeksekusi sinkronisasi ini sekarang?</p>
                `,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#F59E0B',
                cancelButtonColor: '#64748b',
                confirmButtonText: 'Ya, Lanjutkan Sync!',
                cancelButtonText: 'Batal'
            }).then((result) => {
                if (result.isConfirmed) {
                    Swal.fire({
                        title: 'Menyinkronkan...',
                        text: 'Tunggu sebentar, sedang menarik data dari SAP.',
                        allowOutsideClick: false,
                        didOpen: () => {
                            Swal.showLoading();
                        }
                    });

                    google.script.run
                        .withSuccessHandler((response) => {
                            Swal.fire({
                                title: response.status === 'success' ? 'Sukses!' : 'Peringatan',
                                text: response.message,
                                icon: response.status === 'success' ? 'success' : 'warning',
                                confirmButtonColor: '#3B82F6'
                            }).then(() => {
                                if (response.status === 'success') {
                                    CRM.loadProspectTable(); // Reload to show updated prospects
                                }
                            });
                        })
                        .withFailureHandler((error) => {
                            Swal.fire('Error', 'Gagal sinkronisasi data: ' + error.message, 'error');
                        })
                        .triggerSyncSalesToTraffic();
                }
            });
        }
    };
</script>
