<!-- 3. CALENDAR HEATMAP VIEW COMPONENT -->
<div id="viewCalendar">
    <div class="flex justify-between items-center mb-6">
        <div>
            <h2 class="font-display text-xl font-bold text-brand-dark">Sales Heatmap Calendar</h2>
            <p class="text-xs text-slate-500">Visualizing Daily Sales Intensity & Engagement Patterns</p>
        </div>
    </div>

    <!-- Calendar Insights -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
        <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm flex flex-col justify-center">
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Highest Grossing Day</p>
            <h3 class="text-lg lg:text-xl font-display font-bold text-brand-dark tracking-tight" id="calBestDay">-</h3>
            <div class="text-[10px] text-emerald-600 font-bold mt-1 max-w-full truncate" id="calBestDaySales">-</div>
        </div>
        <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm flex flex-col justify-center">
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Lowest Grossing Day</p>
            <h3 class="text-lg lg:text-xl font-display font-bold text-brand-dark tracking-tight" id="calWorstDay">-</h3>
            <div class="text-[10px] text-rose-500 font-bold mt-1 max-w-full truncate" id="calWorstDaySales">-</div>
        </div>
        <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm flex flex-col justify-center">
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Best Day of Week</p>
            <h3 class="text-lg lg:text-xl font-display font-bold text-brand-dark tracking-tight" id="calBestDOW">-</h3>
            <div class="text-[10px] text-slate-500 font-bold mt-1 max-w-full truncate">Avg. Highest Performing Weekday
            </div>
        </div>
    </div>

    <!-- The Calendar Grid Area -->
    <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-6 overflow-x-auto">
        <h3 class="font-display text-base font-bold text-brand-dark mb-4" id="calendarMonthTitle">Daily Performance
            Heatmap</h3>
        <div class="min-w-[700px]">
            <!-- Headers: Sun - Sat -->
            <div class="grid grid-cols-7 gap-2 text-center mb-2">
                <div class="text-[10px] font-bold text-rose-500 uppercase">Sun</div>
                <div class="text-[10px] font-bold text-slate-400 uppercase">Mon</div>
                <div class="text-[10px] font-bold text-slate-400 uppercase">Tue</div>
                <div class="text-[10px] font-bold text-slate-400 uppercase">Wed</div>
                <div class="text-[10px] font-bold text-slate-400 uppercase">Thu</div>
                <div class="text-[10px] font-bold text-slate-400 uppercase">Fri</div>
                <div class="text-[10px] font-bold text-blue-500 uppercase">Sat</div>
            </div>
            <!-- The Grid Container -->
            <div id="calendarGrid" class="grid grid-cols-7 gap-2">
                <!-- Data will be injected via JS here -->
            </div>
        </div>

        <!-- Legend -->
        <div class="mt-8 flex items-center justify-end gap-2 text-xs text-slate-500">
            <span>Low Sales</span>
            <div class="flex gap-1" id="calendarLegend">
                <div class="w-4 h-4 rounded-sm bg-slate-50 border border-slate-100"></div>
                <!-- Gradients will go here via JS based on selected color scale -->
                <div class="w-4 h-4 rounded-sm bg-emerald-100"></div>
                <div class="w-4 h-4 rounded-sm bg-emerald-300"></div>
                <div class="w-4 h-4 rounded-sm bg-emerald-500"></div>
                <div class="w-4 h-4 rounded-sm bg-emerald-700"></div>
            </div>
            <span>High Sales</span>
        </div>
    </div>

    <!-- NOTE MODAL -->
    <div id="noteModal" class="note-modal-overlay hidden" onclick="if(event.target===this) APP.closeNoteModal()">
        <div class="note-modal-card">
            <div class="flex items-center justify-between mb-4">
                <div>
                    <h3 class="font-display text-base font-bold text-brand-dark">Add Note</h3>
                    <p class="text-xs text-slate-500 mt-0.5" id="noteModalDate">-</p>
                </div>
                <button onclick="APP.closeNoteModal()" title="Close Note"
                    class="text-slate-400 hover:text-slate-600 transition-colors p-1 rounded-lg hover:bg-slate-100">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12">
                        </path>
                    </svg>
                </button>
            </div>
            <textarea id="noteModalText" rows="4" maxlength="500"
                class="w-full bg-slate-50 border border-slate-200 rounded-lg p-3 text-sm text-slate-700 focus:ring-2 focus:ring-brand-blue focus:border-brand-blue resize-none transition-all placeholder:text-slate-400"
                placeholder="Tulis catatan untuk tanggal ini... (maks 500 karakter)"></textarea>
            <p class="text-[10px] text-slate-400 mt-1 text-right"><span id="noteCharCount">0</span>/500</p>
            <div class="flex items-center justify-between mt-4">
                <button onclick="APP.deleteNote()" id="noteDeleteBtn"
                    class="hidden text-xs font-bold text-red-500 hover:text-red-700 hover:bg-red-50 px-3 py-1.5 rounded-lg transition-all">
                    Delete Note
                </button>
                <div class="flex gap-2 ml-auto">
                    <button onclick="APP.closeNoteModal()"
                        class="px-4 py-2 rounded-lg text-xs font-bold text-slate-500 hover:bg-slate-100 transition-all">
                        Cancel
                    </button>
                    <button onclick="APP.saveNote()" id="noteSaveBtn"
                        class="px-5 py-2 rounded-lg text-xs font-bold bg-brand-blue text-white hover:bg-blue-700 transition-all shadow-sm active:scale-95">
                        Save Note
                    </button>
                </div>
            </div>
        </div>
    </div>

</div>
